<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#BA7517">
<title>Fleet Prestart</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{
  --bg:#fff;--bg2:#f6f5f1;--bg3:#eeedea;
  --tx:#1c1c1a;--tx2:#6b6b68;--tx3:#9e9e9b;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.18);
  --r:8px;--rl:12px;
  --accent:#BA7517;
  --ok-bg:#e6f5ee;--ok-tx:#0d5a33;--ok-bd:#9FE1CB;
  --warn-bg:#fdf0d8;--warn-tx:#5a3800;--warn-bd:#FAC775;
  --fail-bg:#faeaea;--fail-tx:#5a1010;--fail-bd:#F09595;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2f2f2c;
  --tx:#f0efe8;--tx2:#999992;--tx3:#666660;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);
  --ok-bg:#0a2418;--ok-tx:#5DCAA5;--ok-bd:#085041;
  --warn-bg:#2a1e05;--warn-tx:#FAC775;--warn-bd:#633806;
  --fail-bg:#28100e;--fail-tx:#F09595;--fail-bd:#501313;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);font-size:15px;line-height:1.5}
input,textarea,select,button{font-family:inherit;font-size:14px;color:var(--tx)}
.app{max-width:600px;margin:0 auto;padding-bottom:48px;min-height:100vh;background:var(--bg3)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:100;gap:10px}
.nav-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-badge{background:var(--accent);color:#fff;font-size:9px;letter-spacing:.12em;padding:2px 7px;border-radius:4px;font-weight:600}
.nav-title{font-weight:600;font-size:14px;letter-spacing:.04em}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:6px 11px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:12px;cursor:pointer}
.ntab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-ok{background:#1D9E75}.sync-pend{background:#CF8C00}.sync-off{background:#aaa}
.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;gap:18px;padding:40px 24px;text-align:center}
.auth-sup{font-size:11px;letter-spacing:.14em;color:var(--tx3);font-weight:600}
.auth-h{font-size:30px;font-weight:700;letter-spacing:.02em}
.auth-sub{font-size:13px;color:var(--tx2)}
.auth-input{width:100%;max-width:300px;padding:12px 16px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:15px;text-align:center;outline:none}
.auth-input:focus{border-color:var(--accent)}
.abtn{width:100%;max-width:300px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;letter-spacing:.1em;font-weight:700;cursor:pointer}
.abtn:disabled{opacity:.35;cursor:default}
.abtn-ghost{width:100%;max-width:300px;padding:12px;background:transparent;border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--tx2);font-size:12px;letter-spacing:.06em;cursor:pointer}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.flabel{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600}
.finput{padding:9px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none;font-size:13px;width:100%}
.finput:focus{border-color:var(--accent)}
.finput.mono{font-family:monospace;font-size:12px}
.page{padding:16px}
.slabel{font-size:10px;letter-spacing:.12em;color:var(--tx3);font-weight:600;margin-bottom:10px;display:block}
.back{background:transparent;border:none;color:var(--tx3);font-size:12px;letter-spacing:.06em;padding:0;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.empty{text-align:center;padding:40px 20px;font-size:13px;color:var(--tx3)}
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer}
.v-card:hover{border-color:var(--bd2)}
.v-id{font-size:22px;font-weight:700;letter-spacing:.04em}
.v-model{font-size:11px;color:var(--tx2);margin-top:2px}
.v-km{font-size:11px;color:var(--tx3);margin-top:8px}
.badge{font-size:10px;display:inline-block;padding:2px 8px;border-radius:4px;margin-top:6px;font-weight:600}
.badge-ok{background:var(--ok-bg);color:var(--ok-tx)}
.badge-warn{background:var(--warn-bg);color:var(--warn-tx)}
.badge-fail{background:var(--fail-bg);color:var(--fail-tx)}
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.card-p{padding:14px 16px}
.form-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.fh-id{font-size:24px;font-weight:700;letter-spacing:.04em}
.fh-date{text-align:right;font-size:11px;color:var(--tx2)}

.issues-banner{background:var(--fail-bg);border:0.5px solid var(--fail-bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ib-title{font-size:10px;letter-spacing:.1em;color:var(--fail-tx);font-weight:700;margin-bottom:8px}
.ib-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:6px 0;border-top:0.5px solid var(--fail-bd)}
.ib-cat{font-size:9px;background:var(--fail-bd);color:var(--fail-tx);padding:2px 6px;border-radius:3px;font-weight:700}
.ib-lbl{font-size:13px;color:var(--fail-tx);flex:1}
.ib-since{font-size:10px;color:var(--fail-tx);opacity:.7}
.ib-note{width:100%;font-size:12px;color:var(--fail-tx);opacity:.8;padding-top:2px}
.odo-box{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.odo-lbl{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600;margin-bottom:5px}
.odo-in{width:100%;padding:8px 0;border:none;border-bottom:1.5px solid var(--bd2);background:transparent;font-size:24px;font-weight:700;color:var(--tx);outline:none}
.odo-in:focus{border-bottom-color:var(--accent)}
.prog{margin-bottom:10px}
.prog-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--tx3);text-align:right;margin-top:3px}
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.ctab{padding:6px 10px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:11px;cursor:pointer}
.ctab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.ctab.fail{border-color:var(--fail-bd);color:var(--fail-tx)}
.ctab.done{border-color:var(--ok-bd);color:var(--ok-tx)}
.cat-banner{border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:11px;line-height:1.5}
.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ci{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px}
.ci.pass{border-color:var(--ok-bd);background:var(--ok-bg)}
.ci.fail{border-color:var(--fail-bd);background:var(--fail-bg)}
.ci.na{opacity:.5}
.ci-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.ci-lbl{font-size:14px;flex:1}
.ci.pass .ci-lbl{color:var(--ok-tx)}
.ci.fail .ci-lbl{color:var(--fail-tx)}
.ci-fire{color:var(--fail-tx);font-weight:700}
.ci-btns{display:flex;gap:5px;flex-shrink:0}
.ck{width:44px;height:44px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ck.p{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ck.f{background:#C94520;border-color:#C94520;color:#fff}
.ck.n{background:var(--tx2);border-color:var(--tx2);color:#fff;font-size:11px;font-weight:700}
.ci-comment{width:100%;margin-top:8px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-size:13px;outline:none;resize:vertical;min-height:48px}
.sbmt{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;letter-spacing:.1em;font-weight:700;cursor:pointer}
.sbmt:disabled{opacity:.35;cursor:default}
.sbox{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;text-align:center}
.s-icon{width:56px;height:56px;background:var(--ok-bg);border-radius:50%;display:flex;align-items:center;justify-content:center}
.s-title{font-size:20px;font-weight:700;color:var(--ok-tx)}
.s-sub{font-size:13px;color:var(--tx2)}
.offline-banner{background:var(--warn-bg);border:0.5px solid var(--warn-bd);border-radius:var(--r);padding:9px 14px;margin:0 16px 10px;font-size:12px;color:var(--warn-tx);text-align:center}
.alert-strip{background:var(--warn-bg);border:0.5px solid var(--warn-bd);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--warn-tx);display:flex;align-items:center;gap:8px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer}
.dc:hover{border-color:var(--bd2)}
.dc-id{font-size:20px;font-weight:700;letter-spacing:.04em;margin-bottom:1px}
.dc-model{font-size:10px;color:var(--tx3);margin-bottom:10px}
.dc-stats{display:flex;gap:10px;flex-wrap:wrap}
.ds-lbl{font-size:9px;letter-spacing:.08em;color:var(--tx3);font-weight:600}
.ds-val{font-size:16px;font-weight:700}
.ds-issues{color:var(--fail-tx)}
.dh{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.dh-id{font-size:26px;font-weight:700;letter-spacing:.04em}
.dh-model{font-size:12px;color:var(--tx2);margin-bottom:10px}
.dh-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--tx2)}
.dh-meta strong{color:var(--tx);font-weight:600}
.tabs{display:flex;gap:5px;margin-bottom:12px}
.tbtn{padding:7px 13px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;position:relative}
.tbtn.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.tb-badge{position:absolute;top:-5px;right:-5px;background:#C94520;color:#fff;border-radius:10px;font-size:9px;padding:1px 4px;font-weight:700;min-width:16px;text-align:center}
.chart-wrap{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.chart-title{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600;margin-bottom:12px}
.info-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:0.5px solid var(--bd);font-size:13px}
.ir:last-child{border-bottom:none}
.ik{color:var(--tx2)}
.iv{font-weight:600}
.issue-card{background:var(--bg);border:0.5px solid var(--fail-bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.issue-card.resolved{opacity:.4;border-color:var(--bd)}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.ic-lbl{font-size:14px;font-weight:600;margin-top:4px}
.ic-desc{font-size:13px;color:var(--tx2);margin-bottom:4px}
.ic-meta{font-size:11px;color:var(--tx3)}
.resolve-btn{background:var(--ok-bg);color:var(--ok-tx);border:0.5px solid var(--ok-bd);border-radius:6px;padding:6px 10px;font-size:10px;letter-spacing:.06em;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0}
.resolved-tick{font-size:10px;color:var(--ok-tx);font-weight:600}
.add-btn{width:100%;padding:11px;background:transparent;border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--accent);font-size:11px;letter-spacing:.1em;font-weight:700;cursor:pointer;margin-bottom:10px}
.svc-form{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.svc-save{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:11px;letter-spacing:.1em;font-weight:700;cursor:pointer;margin-top:4px}
.svc-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:8px}
.svc-hdr{display:flex;justify-content:space-between;margin-bottom:4px}
.svc-date{font-size:14px;font-weight:600}
.svc-km{font-size:14px;color:var(--accent);font-weight:700}
.svc-tech{font-size:11px;color:var(--tx3);margin-bottom:8px}
.svc-sect{border-left:2px solid var(--ok-bd);padding-left:10px;margin-top:8px}
.svc-sect.pend{border-color:var(--warn-bd)}
.svc-sect-lbl{font-size:9px;letter-spacing:.1em;color:var(--ok-tx);font-weight:700;margin-bottom:2px}
.svc-sect.pend .svc-sect-lbl{color:var(--warn-tx)}
.svc-sect-txt{font-size:13px;color:var(--tx2)}
.add-v-form{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.color-swatch.sel{border-color:var(--tx)}
</style>

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--tx3);font-size:13px">Loading...</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIGURATION ── swap these two lines with your Supabase values ──
var SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
var SUPABASE_KEY = 'YOUR_ANON_KEY';
var SUPERVISOR_PIN = '1111';
// ─────────────────────────────────────────────────────────────────────

var IDB=(function(){
  var _db=null;
  function open(){
    if(_db)return Promise.resolve(_db);
    return new Promise(function(res,rej){
      var req=indexedDB.open('prestart_v3',1);
      req.onupgradeneeded=function(e){
        var db=e.target.result;
        if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
        if(!db.objectStoreNames.contains('queue'))db.createObjectStore('queue',{keyPath:'qid',autoIncrement:true});
      };
      req.onsuccess=function(e){_db=e.target.result;res(_db);};
      req.onerror=function(){rej(req.error);};
    });
  }
  function iget(key){return open().then(function(db){return new Promise(function(res,rej){var r=db.transaction('kv','readonly').objectStore('kv').get(key);r.onsuccess=function(){res(r.result||null);};r.onerror=function(){rej(r.error);};});});}
  function iset(key,val){return open().then(function(db){return new Promise(function(res,rej){var r=db.transaction('kv','readwrite').objectStore('kv').put(val,key);r.onsuccess=function(){res();};r.onerror=function(){rej(r.error);};});});}
  function qall(){return open().then(function(db){return new Promise(function(res,rej){var r=db.transaction('queue','readonly').objectStore('queue').getAll();r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};});});}
  function qadd(item){return open().then(function(db){return new Promise(function(res,rej){var r=db.transaction('queue','readwrite').objectStore('queue').add(Object.assign({},item,{ts:Date.now()}));r.onsuccess=function(){res(r.result);};r.onerror=function(){rej(r.error);};});});}
  function qdel(qid){return open().then(function(db){return new Promise(function(res,rej){var r=db.transaction('queue','readwrite').objectStore('queue').delete(qid);r.onsuccess=function(){res();};r.onerror=function(){rej(r.error);};});});}
  function qcount(){return qall().then(function(q){return q.length;});}
  return{get:iget,set:iset,queueAll:qall,queueAdd:qadd,queueDelete:qdel,queueCount:qcount};
})();

var _sb=null,_onSyncUpdate=null;
var Sync={
  processing:false,
  init:function(url,key,onUpdate){_sb=supabase.createClient(url,key);_onSyncUpdate=onUpdate;},
  process:function(){
    var self=this;
    if(self.processing||!navigator.onLine||!_sb)return;
    self.processing=true;
    IDB.queueAll().then(function(queue){
      var chain=Promise.resolve();
      queue.forEach(function(item){
        chain=chain.then(function(){
          return IDB.get(item.idbKey).then(function(data){
            if(!data)return IDB.queueDelete(item.qid);
            var payload=Array.isArray(data)?data:[data];
            return _sb.from(item.table).upsert(payload,{onConflict:item.conflict||'id'}).then(function(r){
              if(r.error)throw r.error;
              return IDB.queueDelete(item.qid);
            });
          }).catch(function(e){console.warn('sync fail',item.table,e.message);});
        });
      });
      return chain;
    }).finally(function(){
      self.processing=false;
      if(_onSyncUpdate)IDB.queueCount().then(_onSyncUpdate);
    });
  },
  queue:function(table,idbKey,conflict){
    var self=this;
    return IDB.queueAdd({table:table,idbKey:idbKey,conflict:conflict}).then(function(){
      if(navigator.onLine)self.process();
    });
  }
};
window.addEventListener('online',function(){Sync.process();});
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='visible')Sync.process();});

var DB={
  getVehicles:function(){return IDB.get('vehicles').then(function(v){return v||[];});},
  saveVehicles:function(v){return IDB.set('vehicles',v).then(function(){return Sync.queue('vehicles','vehicles','id');});},
  getPrestart:function(vid,date){return IDB.get('ps_'+vid+'_'+date);},
  savePrestart:function(ps){return IDB.set('ps_'+ps.vehicle_id+'_'+ps.date,ps).then(function(){return Sync.queue('prestarts','ps_'+ps.vehicle_id+'_'+ps.date,'vehicle_id,date');});},
  getIssues:function(vid){return IDB.get('issues_'+vid).then(function(v){return v||[];});},
  saveIssues:function(vid,issues){return IDB.set('issues_'+vid,issues).then(function(){return Sync.queue('issues','issues_'+vid,'id');});},
  resolveIssue:function(vid,issueId){
    var self=this;
    return self.getIssues(vid).then(function(issues){
      var updated=issues.map(function(i){return i.id===issueId?Object.assign({},i,{resolved:true,resolved_date:today()}):i;});
      return IDB.set('issues_'+vid,updated).then(function(){
        return Sync.queue('issues','issues_'+vid,'id').then(function(){return updated;});
      });
    });
  },
  getKmHistory:function(vid){return IDB.get('km_'+vid).then(function(v){return v||[];});},
  addKmEntry:function(vid,date,odometer){
    var self=this;
    return self.getKmHistory(vid).then(function(h){
      var id=vid+'_'+date;
      var entry={id:id,vehicle_id:vid,date:date,odometer:odometer};
      var idx=h.findIndex(function(x){return x.date===date;});
      if(idx>=0)h[idx]=entry;else h.push(entry);
      return IDB.set('km_'+vid,h).then(function(){return Sync.queue('km_history','km_'+vid,'vehicle_id,date');});
    });
  },
  getServiceRecords:function(vid){return IDB.get('svcs_'+vid).then(function(v){return v||[];});},
  addServiceRecord:function(vid,record){
    var self=this;
    return self.getServiceRecords(vid).then(function(recs){
      recs.push(record);
      return IDB.set('svcs_'+vid,recs).then(function(){return Sync.queue('service_records','svcs_'+vid,'id');});
    });
  },
  updateVehicleService:function(vid,km,date){
    var self=this;
    return self.getVehicles().then(function(vehicles){
      var updated=vehicles.map(function(v){return v.id===vid?Object.assign({},v,{last_service_km:km,last_service_date:date}):v;});
      return IDB.set('vehicles',updated).then(function(){
        return Sync.queue('vehicles','vehicles','id').then(function(){return updated;});
      });
    });
  },
  pullAll:function(){
    if(!_sb||!navigator.onLine)return Promise.resolve();
    return _sb.from('vehicles').select('*').order('id').then(function(r){
      if(!r.data||r.data.length===0)return;
      return IDB.set('vehicles',r.data).then(function(){
        var chain=Promise.resolve();
        r.data.forEach(function(v){
          chain=chain.then(function(){
            return Promise.all([
              _sb.from('issues').select('*').eq('vehicle_id',v.id).then(function(r2){if(r2.data)return IDB.set('issues_'+v.id,r2.data);}),
              _sb.from('km_history').select('*').eq('vehicle_id',v.id).order('date').then(function(r2){if(r2.data)return IDB.set('km_'+v.id,r2.data);}),
              _sb.from('service_records').select('*').eq('vehicle_id',v.id).order('date').then(function(r2){if(r2.data)return IDB.set('svcs_'+v.id,r2.data);})
            ]);
          });
        });
        return chain;
      });
    }).catch(function(e){console.warn('pull failed',e.message);});
  }
};

function PrestartForm(props){
  var vehicle=props.vehicle,user=props.user;

  var od=useState(''),odometer=od[0],setOdometer=od[1];

  var cr=useState(''),crew=cr[0],setCrew=cr[1];

  var ac=useState('A'),activeCat=ac[0],setActiveCat=ac[1];
  var st=useState('loading'),status=st[0],setStatus=st[1];
  var sv=useState(false),saving=sv[0],setSaving=sv[1];

  useEffect(function(){
    DB.getPrestart(vehicle.id,today()).then(function(ex){
      if(ex){setStatus('done');return;}
      DB.getIssues(vehicle.id).then(function(all){
        setIssues(all.filter(function(i){return !i.resolved;}));
        setStatus('form');
      });
    });
  },[vehicle.id]);

  function catItems(c){return CHECKLIST.filter(function(i){return i.cat===c;});}
  function isAnswered(id){return checks[id]==='pass'||checks[id]==='fail'||checks[id]==='na';}
  var totalDone=CHECKLIST.filter(function(i){return isAnswered(i.id);}).length;
  function catDone(c){return catItems(c).filter(function(i){return isAnswered(i.id);}).length;}
  function catHasFail(c){return catItems(c).some(function(i){return checks[i.id]==='fail';});}
  var critFails=CHECKLIST.filter(function(i){return(i.cat==='A'||i.cat==='B')&&checks[i.id]==='fail';});

  function submit(){
    var missing=CHECKLIST.filter(function(i){return !isAnswered(i.id);});
    if(missing.length>0){alert('Complete all '+missing.length+' remaining item(s) first.');return;}
    if(!odometer||isNaN(odometer)){alert("Enter today's odometer reading.");return;}
    setSaving(true);
    var ps={
      id:vehicle.id+'_'+today(),vehicle_id:vehicle.id,date:today(),
      submitted_by:user,shift:shift,crew:crew,odometer:parseInt(odometer),
      checks:checks,comments:comments,has_critical_fail:critFails.length>0,
      created_at:new Date().toISOString()
    };
    DB.savePrestart(ps).then(function(){
      return DB.addKmEntry(vehicle.id,today(),parseInt(odometer));
    }).then(function(){
      var fails=CHECKLIST.filter(function(i){return checks[i.id]==='fail';});
      if(fails.length===0)return;
      return DB.getIssues(vehicle.id).then(function(allI){
        fails.forEach(function(f){
          if(!allI.find(function(x){return !x.resolved&&x.check_id===f.id;})){
            allI.push({
              id:uid(),vehicle_id:vehicle.id,check_id:f.id,label:f.label,
              category:'Cat '+f.cat,description:comments[f.id]||'Failed prestart \u2014 '+today(),
              date:today(),reported_by:user,resolved:false,created_at:new Date().toISOString()
            });
          }
        });
        return DB.saveIssues(vehicle.id,allI);
      });
    }).then(function(){setSaving(false);setStatus('submitted');});
  }

  if(status==='loading')return null;

    return h('div',{className:'page'},
      h('button',{className:'back',onClick:props.onBack},'\u2190 Back'),
      h('div',{className:'sbox'},
        h('div',{className:'s-icon'},h('svg',{width:24,height:24,viewBox:'0 0 24 24',fill:'none'},
          h('path',{d:'M5 13l4 4L19 7',stroke:'var(--ok-tx)',strokeWidth:2.5,strokeLinecap:'round',strokeLinejoin:'round'}))),
        h('div',{className:'s-title'},status==='submitted'?'Prestart submitted':'Already submitted today'),
        h('div',{className:'s-sub'},vehicle.id+' \u2014 '+fmtDate(today()))

    );

  return h('div',{className:'page'},
    h('button',{className:'back',onClick:props.onBack},'\u2190 Back'),
    h('div',{className:'card',style:{borderLeft:'3px solid '+vehicle.color,marginBottom:10}},
      h('div',{className:'card-p'},
        h('div',{className:'form-hdr'},
          h('div',null,
            h('div',{className:'fh-id',style:{color:vehicle.color}},vehicle.id),
            h('div',{style:{fontSize:12,color:'var(--tx2)'}},vehicle.year+' '+vehicle.make+' '+vehicle.model)
          ),
          h('div',{className:'fh-date'},'Date',h('strong',null,fmtDate(today())))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('div',null,
            h('div',{className:'odo-lbl',style:{marginBottom:4}},'SHIFT'),
            h('div',{style:{display:'flex',gap:6}},
              ['Day','Night'].map(function(s){
                return h('button',{key:s,onClick:function(){setShift(s);},style:{
                  flex:1,padding:'7px 0',cursor:'pointer',
                  border:'0.5px solid '+(shift===s?'var(--accent)':'var(--bd2)'),
                  borderRadius:'var(--r)',fontSize:12,fontWeight:shift===s?700:400,
                  background:shift===s?'var(--accent)':'var(--bg2)',
                  color:shift===s?'#fff':'var(--tx2)'
                }},s);
              })
            )
          ),
          h('div',null,
            h('div',{className:'odo-lbl',style:{marginBottom:4}},'CREW'),
            h('input',{className:'finput',placeholder:'Crew name/no.',value:crew,
              onChange:function(e){setCrew(e.target.value);},style:{padding:'8px 10px'}})
          )
        )
      )
    ),
    issues.length>0&&h('div',{className:'issues-banner'},
      h('div',{className:'ib-title'},'OUTSTANDING ISSUES ('+issues.length+')'),
      issues.map(function(iss){
        return h('div',{key:iss.id,className:'ib-row'},
          h('span',{className:'ib-cat'},iss.category),
          h('span',{className:'ib-lbl'},iss.label),
          h('span',{className:'ib-since'},'Since '+fmtDate(iss.date)),
          iss.description&&h('div',{className:'ib-note'},iss.description)
        );
      })
    ),
    critFails.length>0&&h('div',{style:{background:'var(--fail-bg)',border:'1.5px solid var(--fail-bd)',borderRadius:'var(--r)',padding:'12px 14px',marginBottom:10}},
      h('div',{style:{fontSize:12,fontWeight:700,color:'var(--fail-tx)',marginBottom:6}},'\u26A0 VEHICLE MUST NOT BE OPERATED'),
      h('div',{style:{fontSize:12,color:'var(--fail-tx)',marginBottom:6}},'Cat A/B fault(s) found. Report to Supervisor or Maintenance before operating.'),
      critFails.map(function(f){return h('div',{key:f.id,style:{fontSize:12,color:'var(--fail-tx)',marginTop:3,paddingLeft:8,borderLeft:'2px solid var(--fail-bd)'}},'Cat '+f.cat+': '+f.label);})
    ),
    h('div',{className:'odo-box'},
      h('div',{className:'odo-lbl'},"TODAY'S ODOMETER (km)"),
      h('input',{className:'odo-in',type:'number',inputMode:'numeric',placeholder:'e.g. 45890',value:odometer,onChange:function(e){setOdometer(e.target.value);}})
    ),
    h('div',{className:'prog'},
      h('div',{className:'prog-bar'},h('div',{className:'prog-fill',style:{width:(totalDone/CHECKLIST.length*100)+'%'}})),
      h('div',{className:'prog-txt'},totalDone+'/'+CHECKLIST.length+' complete')

  );
}

function Dashboard(props){
  var fl=useState({}),fleet=fl[0],setFleet=fl[1];
  var ld=useState(true),loading=ld[0],setLoading=ld[1];
  var dt=useState(null),detail=dt[0],setDetail=dt[1];
  var sa=useState(false),showAdd=sa[0],setShowAdd=sa[1];
  useEffect(function(){loadAll();},[ props.vehicles]);
  function loadAll(){
    var d={};
    var chain=Promise.resolve();
    props.vehicles.forEach(function(v){
      chain=chain.then(function(){
        return Promise.all([DB.getKmHistory(v.id),DB.getIssues(v.id),DB.getServiceRecords(v.id)]).then(function(results){
          var km=results[0],iss=results[1],sv=results[2];
          var last=km.length>0?km[km.length-1].odometer:v.last_service_km;
          var since=last-v.last_service_km;
          var to=v.service_interval_km-since;
          d[v.id]={km:km,openIssues:iss.filter(function(i){return !i.resolved;}),allIssues:iss,svcs:sv,last:last,since:since,to:to};
        });
      });
    });
    chain.then(function(){setFleet(d);setLoading(false);});
  }
  function reload(){
    setLoading(true);
    DB.pullAll().then(function(){return DB.getVehicles();}).then(function(v){
      props.setVehicles(v);setFleet({});setDetail(null);
    });
  }
  function addVehicle(v){
    DB.getVehicles().then(function(current){
      if(current.find(function(x){return x.id.toLowerCase()===v.id.toLowerCase();})){alert('Vehicle ID already exists.');return;}
      var updated=current.concat([v]);
      DB.saveVehicles(updated).then(function(){props.setVehicles(updated);setShowAdd(false);});
    });
  }
  if(loading)return h('div',{className:'empty',style:{paddingTop:60}},'Loading fleet...');
  if(detail){
    var dv=props.vehicles.find(function(x){return x.id===detail;});
    var dd=fleet[detail]||{};
    return h(VehicleDetail,{vehicle:dv,data:dd,vehicles:props.vehicles,setVehicles:props.setVehicles,onBack:reload});
  }
  var anyAlert=props.vehicles.some(function(v){return fleet[v.id]&&fleet[v.id].to<=500;});
  return h('div',{className:'page'},
    h('span',{className:'slabel'},'FLEET OVERVIEW'),
    anyAlert&&h('div',{className:'alert-strip'},'\u26A0 One or more vehicles are due for service soon'),
    h('div',{className:'dash-grid'},props.vehicles.map(function(v){
      var d=fleet[v.id]||{};
      var cls=d.to<=0?'badge badge-fail':d.to<=500?'badge badge-warn':'badge badge-ok';
      var txt=d.to===undefined?'':d.to<=0?'SVC OVERDUE':fmtKm(d.to)+'km to svc';
      var hi=d.openIssues&&d.openIssues.length>0;
      return h('div',{key:v.id,className:'dc',style:{borderLeft:'3px solid '+v.color},onClick:function(){setDetail(v.id);}},
        h('div',{className:'dc-id',style:{color:v.color}},v.id),
        h('div',{className:'dc-model'},v.year+' '+v.make+' '+v.model),
        txt&&h('div',{className:cls,style:{marginBottom:10}},txt),
        h('div',{className:'dc-stats'},
          h('div',null,h('div',{className:'ds-lbl'},'CURRENT KM'),h('div',{className:'ds-val'},d.last?fmtKm(d.last):'\u2014')),
          h('div',null,h('div',{className:'ds-lbl'},'SINCE SVC'),h('div',{className:'ds-val'},d.since!==undefined?fmtKm(d.since):'\u2014')),
          h('div',null,h('div',{className:'ds-lbl'},'ISSUES'),h('div',{className:hi?'ds-val ds-issues':'ds-val'},d.openIssues?d.openIssues.length:0))
        )
      );
    })),
    h('button',{className:'add-btn',onClick:function(){setShowAdd(!showAdd);}},showAdd?'CANCEL':'+ ADD VEHICLE'),
    showAdd&&h(AddVehicleForm,{onAdd:addVehicle})
  );
}

  var fs=useState({id:'',make:'',model:'',year:new Date().getFullYear(),color:COLORS[0],last_service_km:'',last_service_date:'',service_interval_km:5000});
  var f=fs[0],setF=fs[1];
  function save(){
    if(!f.id||!f.make||!f.model){alert('Fill in ID, make, and model.');return;}
    props.onAdd(Object.assign({},f,{year:parseInt(f.year),last_service_km:parseInt(f.last_service_km)||0,service_interval_km:parseInt(f.service_interval_km)||5000,updated_at:new Date().toISOString()}));
  }
  return h('div',{className:'add-v-form'},
    h('div',{className:'field'},h('label',{className:'flabel'},'VEHICLE ID'),h('input',{className:'finput',placeholder:'e.g. LV159',value:f.id,onChange:function(e){setF(Object.assign({},f,{id:e.target.value.toUpperCase()}));}})),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
      h('div',{className:'field'},h('label',{className:'flabel'},'MAKE'),h('input',{className:'finput',placeholder:'Toyota',value:f.make,onChange:function(e){setF(Object.assign({},f,{make:e.target.value}));}})),
      h('div',{className:'field'},h('label',{className:'flabel'},'MODEL'),h('input',{className:'finput',placeholder:'HiLux',value:f.model,onChange:function(e){setF(Object.assign({},f,{model:e.target.value}));}}))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
      h('div',{className:'field'},h('label',{className:'flabel'},'YEAR'),h('input',{className:'finput',type:'number',value:f.year,onChange:function(e){setF(Object.assign({},f,{year:e.target.value}));}})),
      h('div',{className:'field'},h('label',{className:'flabel'},'SVC INTERVAL (km)'),h('input',{className:'finput',type:'number',value:f.service_interval_km,onChange:function(e){setF(Object.assign({},f,{service_interval_km:e.target.value}));}}))
    ),
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
      h('div',{className:'field'},h('label',{className:'flabel'},'LAST SVC (km)'),h('input',{className:'finput',type:'number',placeholder:'0',value:f.last_service_km,onChange:function(e){setF(Object.assign({},f,{last_service_km:e.target.value}));}})),
      h('div',{className:'field'},h('label',{className:'flabel'},'LAST SVC DATE'),h('input',{className:'finput',type:'date',value:f.last_service_date,onChange:function(e){setF(Object.assign({},f,{last_service_date:e.target.value}));}}))
    ),
    h('div',{className:'field'},
      h('label',{className:'flabel'},'COLOUR'),
      h('div',{className:'color-row'},COLORS.map(function(c){return h('div',{key:c,className:'color-swatch'+(f.color===c?' sel':''),style:{background:c},onClick:function(){setF(Object.assign({},f,{color:c}));}});}))
    ),
    h('button',{className:'svc-save',onClick:save},'ADD VEHICLE')
  );
}

function SvgLineChart(props){
  var data=props.data,color=props.color,svcDates=props.svcDates||[];
  if(!data||data.length<2)return null;
  var W=500,H=180,PL=40,PR=12,PT=10,PB=28;
  var vals=data.map(function(d){return d.km;});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  function px(i){return PL+(i/(data.length-1))*(W-PL-PR);}
  function py(v){return PT+H-(((v-minV)/range)*(H-PT-PB));}
  var pts=data.map(function(d,i){return px(i)+','+py(d.km);}).join(' ');
  var fillPts=pts+' '+px(data.length-1)+','+(H+PT)+' '+PL+','+(H+PT);
  // x-axis labels: first, middle, last
  var labelIdxs=[0,Math.floor((data.length-1)/2),data.length-1];
  // y-axis ticks
  var yTicks=[minV,minV+range/2,maxV];
  return h('svg',{viewBox:'0 0 '+W+' '+(H+PT+2),width:'100%',style:{display:'block',overflow:'visible'}},
    // grid lines
    yTicks.map(function(v,i){
      return h('line',{key:'g'+i,x1:PL,y1:py(v),x2:W-PR,y2:py(v),stroke:'rgba(128,128,128,0.15)',strokeWidth:1});
    }),
    // service date vertical lines
    svcDates.filter(Boolean).map(function(d,i){
      var idx=data.findIndex(function(x){return x.date===d;});
      if(idx<0)return null;
      return h('line',{key:'s'+i,x1:px(idx),y1:PT,x2:px(idx),y2:H,stroke:'#185FA5',strokeWidth:1,strokeDasharray:'3 3'});
    }),
    // fill under line
    h('polygon',{points:fillPts,fill:color,opacity:.08}),
    // line
    h('polyline',{points:pts,fill:'none',stroke:color,strokeWidth:2,strokeLinejoin:'round',strokeLinecap:'round'}),
    // y-axis labels
    yTicks.map(function(v,i){
      return h('text',{key:'y'+i,x:PL-4,y:py(v)+4,textAnchor:'end',fontSize:9,fill:'#888'},Math.round(v/1000)+'k');
    }),
    // x-axis labels
    labelIdxs.map(function(i){
      return h('text',{key:'x'+i,x:px(i),y:H+PT+2,textAnchor:'middle',fontSize:9,fill:'#888'},data[i].date);
    })
  );
}

function VehicleDetail(props){
  var vehicle=props.vehicle,data=props.data;
  var tb=useState('overview'),tab=tb[0],setTab=tb[1];
  var is=useState(data.allIssues||[]),issues=is[0],setIssues=is[1];
  var sv=useState(data.svcs||[]),svcs=sv[0],setSvcs=sv[1];
  var sf_s=useState(false),showSvcForm=sf_s[0],setShowSvcForm=sf_s[1];
  var sff=useState({date:today(),odometer:'',tech:'',completed:'',outstanding:''}),sf=sff[0],setSf=sff[1];
  var open=issues.filter(function(i){return !i.resolved;});
  var resolved=issues.filter(function(i){return i.resolved;});
  var km=data.km||[];
  var chartData=km.slice(-30).map(function(d){return {date:d.date.slice(5),km:d.odometer};});
  var lastKm=data.last||vehicle.last_service_km;
  var to=data.to;
  function resolve(id){DB.resolveIssue(vehicle.id,id).then(function(updated){setIssues(updated);});}
  function saveSvc(){
    if(!sf.odometer){alert('Enter odometer reading.');return;}
    var rec={id:uid(),vehicle_id:vehicle.id,date:sf.date,odometer:parseInt(sf.odometer),technician:sf.tech,completed:sf.completed,outstanding:sf.outstanding,created_at:new Date().toISOString()};
    DB.addServiceRecord(vehicle.id,rec).then(function(){
      return DB.updateVehicleService(vehicle.id,parseInt(sf.odometer),sf.date);
    }).then(function(updV){
      props.setVehicles(updV);setSvcs(svcs.concat([rec]));setShowSvcForm(false);
      setSf({date:today(),odometer:'',tech:'',completed:'',outstanding:''});
    });
  }
  return h('div',{className:'page'},
    h('button',{className:'back',onClick:props.onBack},'\u2190 Fleet overview'),
    h('div',{className:'dh',style:{borderLeft:'3px solid '+vehicle.color}},
      h('div',{className:'dh-id',style:{color:vehicle.color}},vehicle.id),
      h('div',{className:'dh-model'},vehicle.year+' '+vehicle.make+' '+vehicle.model),
      h('div',{className:'dh-meta'},
        h('span',null,'Current: ',h('strong',null,fmtKm(lastKm)+' km')),
        h('span',null,'Since svc: ',h('strong',null,fmtKm(data.since||0))),
        to<=0
          ?h('span',{style:{color:'var(--fail-tx)',fontWeight:600}},'OVERDUE by '+fmtKm(Math.abs(to))+' km')
          :h('span',{style:{color:to<=500?'var(--warn-tx)':'var(--tx2)'}},h('strong',null,fmtKm(to)),' km to next service')
      )
    ),
    h('div',{className:'tabs'},
      ['overview','issues','services'].map(function(t){
        return h('button',{key:t,className:'tbtn'+(tab===t?' on':''),onClick:function(){setTab(t);}},
          t.charAt(0).toUpperCase()+t.slice(1),
          t==='issues'&&open.length>0&&h('span',{className:'tb-badge'},open.length)
        );
      })
    ),
    tab==='overview'&&h('div',null,
      h('div',{className:'chart-wrap'},
        h('div',{className:'chart-title'},'ODOMETER HISTORY (last 30 entries)'),
        chartData.length>0
          ?h(SvgLineChart,{data:chartData,color:vehicle.color,svcDates:svcs.map(function(s){return s.date?s.date.slice(5):null;})})
          :h('div',{className:'empty'},'No odometer history yet.')
      ),
      h('div',{className:'info-card'},
        h('div',{className:'ir'},h('span',{className:'ik'},'Last service'),h('span',{className:'iv'},fmtDate(vehicle.last_service_date)+' @ '+fmtKm(vehicle.last_service_km)+' km')),
        h('div',{className:'ir'},h('span',{className:'ik'},'Service interval'),h('span',{className:'iv'},fmtKm(vehicle.service_interval_km)+' km')),
        h('div',{className:'ir'},h('span',{className:'ik'},'Next service due at'),h('span',{className:'iv',style:{color:vehicle.color}},fmtKm(vehicle.last_service_km+vehicle.service_interval_km)+' km')),
        h('div',{className:'ir'},h('span',{className:'ik'},'Remaining'),h('span',{className:'iv',style:{color:to<=0?'var(--fail-tx)':to<=500?'var(--warn-tx)':'var(--tx)'}},to<=0?'Overdue by '+fmtKm(Math.abs(to))+' km':fmtKm(to)+' km remaining'))
      )
    ),
    tab==='issues'&&h('div',null,
      open.length===0&&h('div',{className:'empty'},'No outstanding issues'),
      open.map(function(iss){
        return h('div',{key:iss.id,className:'issue-card'},
          h('div',{className:'ic-top'},
            h('div',null,h('span',{className:'badge badge-fail'},iss.category),h('div',{className:'ic-lbl'},iss.label)),
            h('button',{className:'resolve-btn',onClick:function(){resolve(iss.id);}},'MARK RESOLVED')
          ),
          iss.description&&h('div',{className:'ic-desc'},iss.description),
          h('div',{className:'ic-meta'},'Reported by '+iss.reported_by+' \u00B7 '+fmtDate(iss.date))
        );
      }),
      resolved.length>0&&h('div',null,
        h('span',{className:'slabel',style:{marginTop:20}},'RESOLVED'),
        resolved.map(function(iss){
          return h('div',{key:iss.id,className:'issue-card resolved'},
            h('div',{className:'ic-top'},
              h('div',null,h('span',{className:'badge badge-ok'},iss.category),h('div',{className:'ic-lbl'},iss.label)),
              h('span',{className:'resolved-tick'},'\u2713 '+fmtDate(iss.resolved_date))
            ),
            h('div',{className:'ic-meta'},'Reported '+fmtDate(iss.date))
          );
        })
      )
    ),
    tab==='services'&&h('div',null,
      h('button',{className:'add-btn',onClick:function(){setShowSvcForm(!showSvcForm);}},showSvcForm?'CANCEL':'+ LOG SERVICE RECORD'),
      showSvcForm&&h('div',{className:'svc-form'},
        h('div',{className:'field'},h('label',{className:'flabel'},'DATE'),h('input',{className:'finput',type:'date',value:sf.date,onChange:function(e){setSf(Object.assign({},sf,{date:e.target.value}));}})),
        h('div',{className:'field'},h('label',{className:'flabel'},'ODOMETER AT SERVICE (km)'),h('input',{className:'finput',type:'number',placeholder:'e.g. 50000',value:sf.odometer,onChange:function(e){setSf(Object.assign({},sf,{odometer:e.target.value}));}})),
        h('div',{className:'field'},h('label',{className:'flabel'},'TECHNICIAN'),h('input',{className:'finput',placeholder:'Name',value:sf.tech,onChange:function(e){setSf(Object.assign({},sf,{tech:e.target.value}));}})),
        h('div',{className:'field'},h('label',{className:'flabel'},'WORK COMPLETED'),h('textarea',{className:'finput',rows:3,style:{resize:'vertical'},placeholder:'Oil & filter, greasing, tyres...',value:sf.completed,onChange:function(e){setSf(Object.assign({},sf,{completed:e.target.value}));}})),
        h('div',{className:'field'},h('label',{className:'flabel'},'OUTSTANDING / NEXT SERVICE NOTES'),h('textarea',{className:'finput',rows:3,style:{resize:'vertical'},placeholder:'Items to address at next service...',value:sf.outstanding,onChange:function(e){setSf(Object.assign({},sf,{outstanding:e.target.value}));}})),
        h('button',{className:'svc-save',onClick:saveSvc},'SAVE SERVICE RECORD')
      ),
      svcs.length===0&&!showSvcForm&&h('div',{className:'empty'},'No service records yet.'),
      svcs.slice().reverse().map(function(s){
        return h('div',{key:s.id,className:'svc-card'},
          h('div',{className:'svc-hdr'},h('span',{className:'svc-date'},fmtDate(s.date)),h('span',{className:'svc-km'},fmtKm(s.odometer)+' km')),
          s.technician&&h('div',{className:'svc-tech'},'Technician: '+s.technician),
          s.completed&&h('div',{className:'svc-sect'},h('div',{className:'svc-sect-lbl'},'COMPLETED'),h('div',{className:'svc-sect-txt'},s.completed)),
          s.outstanding&&h('div',{className:'svc-sect pend'},h('div',{className:'svc-sect-lbl'},'OUTSTANDING / NEXT SERVICE'),h('div',{className:'svc-sect-txt'},s.outstanding))
        );
      })
    )
  );
}
