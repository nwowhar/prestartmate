<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#BA7517">
<title>Fleet Prestart</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{
  --bg:#fff;--bg2:#f6f5f1;--bg3:#eeedea;
  --tx:#1c1c1a;--tx2:#6b6b68;--tx3:#9e9e9b;
  --bd:rgba(0,0,0,0.09);--bd2:rgba(0,0,0,0.18);
  --r:8px;--rl:12px;
  --accent:#BA7517;--ok:#1D9E75;--fail:#C94520;
  --ok-bg:#e6f5ee;--ok-tx:#0d5a33;--ok-bd:#9FE1CB;
  --warn-bg:#fdf0d8;--warn-tx:#5a3800;--warn-bd:#FAC775;
  --fail-bg:#faeaea;--fail-tx:#5a1010;--fail-bd:#F09595;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252522;--bg3:#2f2f2c;
  --tx:#f0efe8;--tx2:#999992;--tx3:#666660;
  --bd:rgba(255,255,255,0.09);--bd2:rgba(255,255,255,0.18);
  --ok-bg:#0a2418;--ok-tx:#5DCAA5;--ok-bd:#085041;
  --warn-bg:#2a1e05;--warn-tx:#FAC775;--warn-bd:#633806;
  --fail-bg:#28100e;--fail-tx:#F09595;--fail-bd:#501313;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);font-size:15px;line-height:1.5}
input,textarea,select,button{font-family:inherit;font-size:14px;color:var(--tx)}
.app{max-width:600px;margin:0 auto;padding-bottom:48px;min-height:100vh;background:var(--bg3)}
/* Nav */
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:100;gap:10px}
.nav-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-badge{background:var(--accent);color:#fff;font-size:9px;letter-spacing:.12em;padding:2px 7px;border-radius:4px;font-weight:600}
.nav-title{font-weight:600;font-size:14px;letter-spacing:.04em}
.nav-tabs{display:flex;gap:4px}
.ntab{padding:6px 11px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:12px;letter-spacing:.04em;cursor:pointer}
.ntab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-ok{background:#1D9E75}.sync-pend{background:#CF8C00}.sync-off{background:#aaa}
/* Auth */
.auth{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;gap:18px;padding:40px 24px;text-align:center}
.auth-sup{font-size:11px;letter-spacing:.14em;color:var(--tx3);font-weight:600}
.auth-h{font-size:30px;font-weight:700;letter-spacing:.02em}
.auth-sub{font-size:13px;color:var(--tx2)}
.auth-input{width:100%;max-width:300px;padding:12px 16px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--tx);font-size:15px;text-align:center;outline:none;transition:border-color .15s}
.auth-input:focus{border-color:var(--accent)}
.abtn{width:100%;max-width:300px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;letter-spacing:.1em;font-weight:700;cursor:pointer}
.abtn:disabled{opacity:.35;cursor:default}
.abtn-ghost{width:100%;max-width:300px;padding:12px;background:transparent;border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--tx2);font-size:12px;letter-spacing:.06em;cursor:pointer}
.abtn-ghost:hover{background:var(--bg2)}
/* Setup */
.setup{max-width:500px;margin:0 auto;padding:32px 24px;display:flex;flex-direction:column;gap:20px}
.setup-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:20px}
.setup-title{font-size:16px;font-weight:600;margin-bottom:4px}
.setup-sub{font-size:12px;color:var(--tx2);margin-bottom:16px;line-height:1.6}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.flabel{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600}
.finput{padding:9px 12px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);outline:none;font-size:13px;width:100%}
.finput:focus{border-color:var(--accent)}
.finput.mono{font-family:monospace;font-size:12px}
.step{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--tx2);line-height:1.6}
.step-n{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
/* Page */
.page{padding:16px}
.slabel{font-size:10px;letter-spacing:.12em;color:var(--tx3);font-weight:600;margin-bottom:10px;display:block}
/* Vehicle cards */
.v-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.v-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 14px 12px;cursor:pointer;transition:border-color .1s,transform .1s;active:scale(.98)}

.v-id{font-size:22px;font-weight:700;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.v-model{font-size:11px;color:var(--tx2);margin-top:2px}
.v-km{font-size:11px;color:var(--tx3);margin-top:8px;font-variant-numeric:tabular-nums}
.badge{font-size:10px;display:inline-block;padding:2px 8px;border-radius:4px;margin-top:6px;font-weight:600;letter-spacing:.04em}

.badge-fail{background:var(--fail-bg);color:var(--fail-tx)}
/* Form */
.card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.card-p{padding:14px 16px}
.form-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.fh-id{font-size:24px;font-weight:700;letter-spacing:.04em}
.fh-date{text-align:right;font-size:11px;color:var(--tx2)}
.fh-date strong{display:block;font-size:13px;color:var(--tx);margin-top:2px}
.issues-banner{background:var(--fail-bg);border:0.5px solid var(--fail-bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.ib-title{font-size:10px;letter-spacing:.1em;color:var(--fail-tx);font-weight:700;margin-bottom:8px}
.ib-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center;padding:6px 0;border-top:0.5px solid var(--fail-bd)}
.ib-cat{font-size:9px;background:var(--fail-bd);color:var(--fail-tx);padding:2px 6px;border-radius:3px;font-weight:700;letter-spacing:.06em}
.ib-lbl{font-size:13px;color:var(--fail-tx);flex:1}

.ib-note{width:100%;font-size:12px;color:var(--fail-tx);opacity:.8;padding-top:2px}
.odo-box{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:10px}
.odo-lbl{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600;margin-bottom:5px}
.odo-in{width:100%;padding:8px 0;border:none;border-bottom:1.5px solid var(--bd2);background:transparent;font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--tx);outline:none}
.odo-in:focus{border-bottom-color:var(--accent)}
.prog{margin-bottom:10px}
.prog-bar{height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.prog-txt{font-size:10px;color:var(--tx3);text-align:right;margin-top:3px}
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ctab{padding:6px 11px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:11px;letter-spacing:.04em;cursor:pointer}
.ctab.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.ctab.fail{border-color:var(--fail-bd);color:var(--fail-tx)}
.ctab.done{border-color:var(--ok-bd);color:var(--ok-tx)}
.checklist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.ci{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;transition:border-color .1s,background .1s}
.ci.pass{border-color:var(--ok-bd);background:var(--ok-bg)}
.ci.fail{border-color:var(--fail-bd);background:var(--fail-bg)}
.ci-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.ci-lbl{font-size:14px;flex:1}
.ci.pass .ci-lbl{color:var(--ok-tx)}
.ci.fail .ci-lbl{color:var(--fail-tx)}
.ci-btns{display:flex;gap:5px;flex-shrink:0}
.ck{width:46px;height:46px;border-radius:var(--r);border:0.5px solid var(--bd2);background:var(--bg2);color:var(--tx2);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.ck.p{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ck.f{background:#C94520;border-color:#C94520;color:#fff}
.ci-comment{width:100%;margin-top:8px;padding:7px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg2);color:var(--tx);font-size:13px;outline:none;resize:vertical;min-height:50px}
.ci-comment:focus{border-color:var(--accent)}
.sbmt{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:12px;letter-spacing:.1em;font-weight:700;cursor:pointer}
.sbmt:disabled{opacity:.35;cursor:default}
/* Back */
.back{background:transparent;border:none;color:var(--tx3);font-size:12px;letter-spacing:.06em;padding:0;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.back:hover{color:var(--tx2)}
/* Success */
.sbox{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;text-align:center}
.s-icon{width:56px;height:56px;background:var(--ok-bg);border-radius:50%;display:flex;align-items:center;justify-content:center}
.s-title{font-size:20px;font-weight:700;color:var(--ok-tx)}
.s-sub{font-size:13px;color:var(--tx2)}
/* Dashboard */
.alert-strip{background:var(--warn-bg);border:0.5px solid var(--warn-bd);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--warn-tx);display:flex;align-items:center;gap:8px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.dc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;cursor:pointer;transition:border-color .1s}
.dc:hover{border-color:var(--bd2)}
.dc-id{font-size:20px;font-weight:700;letter-spacing:.04em;margin-bottom:1px}
.dc-model{font-size:10px;color:var(--tx3);margin-bottom:10px}
.dc-stats{display:flex;gap:10px;flex-wrap:wrap}
.ds-lbl{font-size:9px;letter-spacing:.08em;color:var(--tx3);font-weight:600}
.ds-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}
.ds-issues{color:var(--fail-tx)}
/* Detail */
.dh{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px}
.dh-id{font-size:26px;font-weight:700;letter-spacing:.04em}
.dh-model{font-size:12px;color:var(--tx2);margin-bottom:10px}
.dh-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--tx2)}
.dh-meta strong{color:var(--tx);font-weight:600}
.tabs{display:flex;gap:5px;margin-bottom:12px}
.tbtn{padding:7px 13px;border:0.5px solid var(--bd);border-radius:20px;background:transparent;color:var(--tx2);font-size:12px;letter-spacing:.04em;cursor:pointer;position:relative}
.tbtn.on{background:var(--bg2);color:var(--tx);border-color:var(--bd2)}
.tb-badge{position:absolute;top:-5px;right:-5px;background:#C94520;color:#fff;border-radius:10px;font-size:9px;padding:1px 4px;font-weight:700;min-width:16px;text-align:center}
.chart-wrap{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.chart-title{font-size:10px;letter-spacing:.1em;color:var(--tx3);font-weight:600;margin-bottom:12px}
.info-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:0.5px solid var(--bd);font-size:13px}
.ir:last-child{border-bottom:none}
.ik{color:var(--tx2)}
.iv{font-weight:600;font-variant-numeric:tabular-nums}
.issue-card{background:var(--bg);border:0.5px solid var(--fail-bd);border-radius:var(--r);padding:12px 14px;margin-bottom:8px}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.ic-lbl{font-size:14px;font-weight:600;margin-top:4px}
.ic-desc{font-size:13px;color:var(--tx2);margin-bottom:4px}
.ic-meta{font-size:11px;color:var(--tx3)}
.resolve-btn{background:var(--ok-bg);color:var(--ok-tx);border:0.5px solid var(--ok-bd);border-radius:6px;padding:6px 10px;font-size:10px;letter-spacing:.06em;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0}
.resolved{opacity:.4;border-color:var(--bd)}
.resolved-tick{font-size:10px;color:var(--ok-tx);letter-spacing:.04em;font-weight:600}
.add-btn{width:100%;padding:11px;background:transparent;border:0.5px solid var(--bd2);border-radius:var(--r);color:var(--accent);font-size:11px;letter-spacing:.1em;font-weight:700;cursor:pointer;margin-bottom:10px}
.svc-form{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.svc-save{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-size:11px;letter-spacing:.1em;font-weight:700;cursor:pointer;margin-top:4px}
.svc-card{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:8px}
.svc-hdr{display:flex;justify-content:space-between;margin-bottom:5px}
.svc-date{font-size:14px;font-weight:600}
.svc-km{font-size:14px;color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.svc-tech{font-size:11px;color:var(--tx3);margin-bottom:8px}
.svc-sect{border-left:2px solid var(--ok-bd);padding-left:10px;margin-top:8px}
.svc-sect.pend{border-color:var(--warn-bd)}
.svc-sect-lbl{font-size:9px;letter-spacing:.1em;color:var(--ok-tx);font-weight:700;margin-bottom:2px}
.svc-sect.pend .svc-sect-lbl{color:var(--warn-tx)}
.svc-sect-txt{font-size:13px;color:var(--tx2)}
.empty{text-align:center;padding:40px 20px;font-size:13px;color:var(--tx3)}
.add-v-form{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:14px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .1s}
.color-swatch.sel{border-color:var(--tx)}
.offline-banner{background:var(--warn-bg);border:0.5px solid var(--warn-bd);border-radius:var(--r);padding:9px 14px;margin-bottom:10px;font-size:12px;color:var(--warn-tx);text-align:center;letter-spacing:.04em}
</style>

<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--tx3);font-size:13px">Loading...</div></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.5.0/umd/Recharts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
// ═══════════════════════════════════════════════════════
//  IndexedDB LAYER
// ═══════════════════════════════════════════════════════
const IDB = (() => {
  let _db = null;
  async function open() {
    if (_db) return _db;
    return new Promise((res, rej) => {
      const req = indexedDB.open('prestart_v2', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
        if (!db.objectStoreNames.contains('queue')) db.createObjectStore('queue', {keyPath:'qid', autoIncrement:true});
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror = () => rej(req.error);
    });
  }
  async function get(key) {
    const db = await open();
    return new Promise((res, rej) => {
      const r = db.transaction('kv','readonly').objectStore('kv').get(key);
      r.onsuccess = () => res(r.result ?? null);
      r.onerror = () => rej(r.error);
    });
  }
  async function set(key, val) {
    const db = await open();
    return new Promise((res, rej) => {
      const r = db.transaction('kv','readwrite').objectStore('kv').put(val, key);
      r.onsuccess = () => res();
      r.onerror = () => rej(r.error);
    });
  }
  async function queueAll() {
    const db = await open();
    return new Promise((res, rej) => {
      const r = db.transaction('queue','readonly').objectStore('queue').getAll();
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function queueAdd(item) {
    const db = await open();
    return new Promise((res, rej) => {
      const r = db.transaction('queue','readwrite').objectStore('queue').add({...item, ts: Date.now()});
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async function queueDelete(qid) {
    const db = await open();
    return new Promise((res, rej) => {
      const r = db.transaction('queue','readwrite').objectStore('queue').delete(qid);
      r.onsuccess = () => res();
      r.onerror = () => rej(r.error);
    });
  }
  async function queueCount() {
    const q = await queueAll();
    return q.length;
  }
  return { get, set, queueAll, queueAdd, queueDelete, queueCount };
})();

// ═══════════════════════════════════════════════════════
//  SYNC MANAGER
// ═══════════════════════════════════════════════════════
let _sb = null;
let _onSyncUpdate = null;

const Sync = {
  processing: false,

  init(url, key, onUpdate) {
    _sb = supabase.createClient(url, key);
    _onSyncUpdate = onUpdate;
  },

  async process() {
    if (this.processing || !navigator.onLine || !_sb) return;
    this.processing = true;
    try {
      const queue = await IDB.queueAll();
      for (const item of queue) {
        try {
          await this._execute(item);
          await IDB.queueDelete(item.qid);
        } catch (e) {
          console.warn('Sync item failed', item.table, e.message);
        }
      }
    } finally {
      this.processing = false;
      if (_onSyncUpdate) {
        const n = await IDB.queueCount();
        _onSyncUpdate(n);
      }
    }
  },

  async _execute(item) {
    const data = await IDB.get(item.idbKey);
    if (!data) return;
    const { error } = await _sb.from(item.table).upsert(
      Array.isArray(data) ? data : [data],
      { onConflict: item.conflict || 'id' }
    );
    if (error) throw error;
  },

  async queue(table, idbKey, conflict) {
    await IDB.queueAdd({ table, idbKey, conflict });
    if (navigator.onLine) this.process();
  }
};

window.addEventListener('online', () => Sync.process());
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') Sync.process();
});

// ═══════════════════════════════════════════════════════
//  DATA API
// ═══════════════════════════════════════════════════════
const DB = {
  async getVehicles() {
    return (await IDB.get('vehicles')) || [];
  },
  async saveVehicles(vehicles) {
    await IDB.set('vehicles', vehicles);
    await Sync.queue('vehicles', 'vehicles', 'id');
  },
  async getPrestart(vehicleId, date) {
    return await IDB.get(`ps_${vehicleId}_${date}`);
  },
  async savePrestart(ps) {
    await IDB.set(`ps_${ps.vehicle_id}_${ps.date}`, ps);
    await Sync.queue('prestarts', `ps_${ps.vehicle_id}_${ps.date}`, 'vehicle_id,date');
  },
  async getIssues(vehicleId) {
    return (await IDB.get(`issues_${vehicleId}`)) || [];
  },
  async saveIssues(vehicleId, issues) {
    await IDB.set(`issues_${vehicleId}`, issues);
    await Sync.queue('issues', `issues_${vehicleId}`, 'id');
  },
  async resolveIssue(vehicleId, issueId) {
    const issues = await this.getIssues(vehicleId);
    const d = today();
    const updated = issues.map(i => i.id === issueId ? {...i, resolved: true, resolved_date: d} : i);
    await IDB.set(`issues_${vehicleId}`, updated);
    await Sync.queue('issues', `issues_${vehicleId}`, 'id');
    return updated;
  },
  async getKmHistory(vehicleId) {
    return (await IDB.get(`km_${vehicleId}`)) || [];
  },
  async addKmEntry(vehicleId, date, odometer) {
    const h = await this.getKmHistory(vehicleId);
    const id = `${vehicleId}_${date}`;
    const idx = h.findIndex(x => x.date === date);
    const entry = { id, vehicle_id: vehicleId, date, odometer };
    if (idx >= 0) h[idx] = entry; else h.push(entry);
    await IDB.set(`km_${vehicleId}`, h);
    await Sync.queue('km_history', `km_${vehicleId}`, 'vehicle_id,date');
  },
  async getServiceRecords(vehicleId) {
    return (await IDB.get(`svcs_${vehicleId}`)) || [];
  },
  async addServiceRecord(vehicleId, record) {
    const recs = await this.getServiceRecords(vehicleId);
    recs.push(record);
    await IDB.set(`svcs_${vehicleId}`, recs);
    await Sync.queue('service_records', `svcs_${vehicleId}`, 'id');
  },
  async updateVehicleService(vehicleId, km, date) {
    const vehicles = await this.getVehicles();
    const updated = vehicles.map(v => v.id === vehicleId ? {...v, last_service_km: km, last_service_date: date} : v);
    await IDB.set('vehicles', updated);
    await Sync.queue('vehicles', 'vehicles', 'id');
    return updated;
  },
  async pullAll() {
    if (!_sb || !navigator.onLine) return;
    try {
      const { data: vs } = await _sb.from('vehicles').select('*').order('id');
      if (vs && vs.length > 0) await IDB.set('vehicles', vs);

      const vids = (vs || []).map(v => v.id);
      for (const vid of vids) {
        const { data: iss } = await _sb.from('issues').select('*').eq('vehicle_id', vid);
        if (iss) await IDB.set(`issues_${vid}`, iss);
        const { data: km } = await _sb.from('km_history').select('*').eq('vehicle_id', vid).order('date');
        if (km) await IDB.set(`km_${vid}`, km);
        const { data: sv } = await _sb.from('service_records').select('*').eq('vehicle_id', vid).order('date');
        if (sv) await IDB.set(`svcs_${vid}`, sv);
      }
    } catch(e) { console.warn('Pull failed', e.message); }
  }
};

// ─── DASHBOARD ──────────────────────────────────────────
function Dashboard({vehicles, setVehicles, refreshVehicles}) {
  const [fleet, setFleet] = useState({});
  const [loading, setLoading] = useState(true);
  const [detail, setDetail] = useState(null);
  const [showAdd, setShowAdd] = useState(false);

  useEffect(() => { loadAll() }, [vehicles]);

  async function loadAll() {
    const d = {};
    for (const v of vehicles) {
      const km = await DB.getKmHistory(v.id);
      const iss = await DB.getIssues(v.id);
      const svcs = await DB.getServiceRecords(v.id);
      const last = km.length > 0 ? km[km.length-1].odometer : v.last_service_km;
      const since = last - v.last_service_km;
      const to = v.service_interval_km - since;
      d[v.id] = {km, openIssues:iss.filter(i=>!i.resolved), allIssues:iss, svcs, last, since, to};
    }
    setFleet(d);
    setLoading(false);
  }

  async function reload() {
    setLoading(true);
    await DB.pullAll();
    const v = await DB.getVehicles();
    setVehicles(v);
    setFleet({});
    setDetail(null);
  }

  async function addVehicle(v) {
    const current = await DB.getVehicles();
    if (current.find(x => x.id.toLowerCase() === v.id.toLowerCase())) { alert('Vehicle ID already exists.'); return; }
    const updated = [...current, v];
    await DB.saveVehicles(updated);
    setVehicles(updated);
    setShowAdd(false);
  }

  if (loading) return React.createElement('div', {className:'empty', style:{paddingTop:60}}, 'Loading fleet...');

  if (detail) {
    const v = vehicles.find(x => x.id === detail);
    const d = fleet[detail] || {};
    return React.createElement(VehicleDetail, {vehicle:v, data:d, vehicles, setVehicles, onBack:reload});
  }

  const anyAlert = vehicles.some(v => fleet[v.id] && fleet[v.id].to <= 500);

  return React.createElement('div', {className:'page'},
    React.createElement('span', {className:'slabel'}, 'FLEET OVERVIEW'),
    anyAlert && React.createElement('div', {className:'alert-strip'},
      '⚠ ', ' One or more vehicles are due for service soon'
    ),
    React.createElement('div', {className:'dash-grid'},
      vehicles.map(v => {
        const d = fleet[v.id] || {};
        const cls = d.to <= 0 ? 'badge badge-fail' : d.to <= 500 ? 'badge badge-warn' : 'badge badge-ok';
        const txt = d.to === undefined ? '' : d.to <= 0 ? 'SVC OVERDUE' : d.to <= 500 ? fmtKm(d.to)+'km to svc' : fmtKm(d.to)+'km to svc';
        return React.createElement('div', {key:v.id, className:'dc', style:{borderLeft:'3px solid '+v.color}, onClick:()=>setDetail(v.id)},
          React.createElement('div', {className:'dc-id', style:{color:v.color}}, v.id),
          React.createElement('div', {className:'dc-model'}, v.year+' '+v.make+' '+v.model),
          txt && React.createElement('div', {className:cls, style:{marginBottom:10}}, txt),
          React.createElement('div', {className:'dc-stats'},
            React.createElement('div', null, React.createElement('div', {className:'ds-lbl'}, 'CURRENT KM'), React.createElement('div', {className:'ds-val'}, d.last ? fmtKm(d.last) : '—')),
            React.createElement('div', null, React.createElement('div', {className:'ds-lbl'}, 'SINCE SVC'), React.createElement('div', {className:'ds-val'}, d.since !== undefined ? fmtKm(d.since) : '—')),
            React.createElement('div', null, React.createElement('div', {className:'ds-lbl'}, 'ISSUES'), React.createElement('div', {className:'ds-val'+(d.openIssues&&d.openIssues.length>0?' ds-issues':'')}, d.openIssues ? d.openIssues.length : 0))
          )
        );
      })
    ),
    React.createElement('button', {className:'add-btn', onClick:()=>setShowAdd(!showAdd)}, showAdd ? 'CANCEL' : '+ ADD VEHICLE'),
    showAdd && React.createElement(AddVehicleForm, {onAdd:addVehicle})
  );
}

        COLORS.map(c => React.createElement('div', {key:c, className:'color-swatch'+(f.color===c?' sel':''), style:{background:c}, onClick:()=>setF({...f,color:c})}))
      )

  );
}

  const open = issues.filter(i => !i.resolved);

  async function resolve(id) {
