// IDB
var IDB = (function(){
  var _db = null;
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise(function(res,rej) {
      var req = indexedDB.open('prestart_worker_v1',1);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
        if (!db.objectStoreNames.contains('queue')) db.createObjectStore('queue',{keyPath:'qid',autoIncrement:true});
      };
      req.onsuccess = function(e) { _db = e.target.result; res(_db); };
      req.onerror   = function()  { rej(req.error); };
    });
  }
  function get(k) {
    return open().then(function(db) {
      return new Promise(function(res,rej) {
        var r = db.transaction('kv','readonly').objectStore('kv').get(k);
        r.onsuccess = function() { res(r.result||null); };
        r.onerror   = function() { rej(r.error); };
      });
    });
  }
  function set(k,v) {
    return open().then(function(db) {
      return new Promise(function(res,rej) {
        var r = db.transaction('kv','readwrite').objectStore('kv').put(v,k);
        r.onsuccess = function() { res(); };
        r.onerror   = function() { rej(r.error); };
      });
    });
  }
  return { get:get, set:set };
})();

window.addEventListener('load', function() {
  var useState  = React.useState;
  var useEffect = React.useEffect;
  var h         = React.createElement;

  // ── PIN SCREEN ──────────────────────────────────────────
  function PinScreen(props) {
    var pi = useState(''), pin=pi[0], setPin=pi[1];
    var er = useState(''), err=er[0], setErr=er[1];
    function attempt() {
      if (pin === SUPERVISOR_PIN) {
        props.onUnlock();
      } else {
        setErr('Incorrect PIN');
        setPin('');
        setTimeout(function(){ setErr(''); }, 2000);
      }
    }
    return h('div',{className:'pin-screen'},
      h('div',{className:'pin-sup'},'FLEET MANAGEMENT'),
      h('div',{className:'pin-h'},'Supervisor Dashboard'),
      h('div',{className:'pin-sub'},'Enter your PIN to continue'),
      h('input',{
        className:'pin-in', type:'password', inputMode:'numeric',
        maxLength:6, placeholder:'\u2022\u2022\u2022\u2022',
        value:pin, autoFocus:true,
        onChange:function(e){ setPin(e.target.value); setErr(''); },
        onKeyDown:function(e){ if(e.key==='Enter') attempt(); }
      }),
      h('div',{className:'pin-err'}, err),
      h('button',{className:'pin-btn', disabled:!pin, onClick:attempt},'UNLOCK'),
      h('a',{href:'/',className:'pin-back'},'\u2190 Back to prestart')
    );
  }

  // ── APP ─────────────────────────────────────────────────
  function App() {
    var ul = useState(false), unlocked=ul[0], setUnlocked=ul[1];
    var vs = useState([]), vehicles=vs[0], setVehicles=vs[1];
    var sc = useState('fleet'), screen=sc[0], setScreen=sc[1];
    var dt = useState(null), detail=dt[0], setDetail=dt[1];
    var on = useState(navigator.onLine), online=on[0], setOnline=on[1];

    useEffect(function(){
      window.addEventListener('online',  function(){ setOnline(true); });
      window.addEventListener('offline', function(){ setOnline(false); });
    },[]);

    function onUnlock() {
      _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      setUnlocked(true);
      loadFleet();
    }

    function loadFleet() {
      setScreen('loading');
      _sb.from('vehicles').select('*').order('id').then(function(r){
        if (r.data) setVehicles(r.data);
        setScreen('fleet');
      }).catch(function(){ setScreen('fleet'); });
    }

    if (!unlocked) {
      return h(PinScreen, {onUnlock: onUnlock});
    }

    return h('div',{className:'wrap'},
      h('div',{className:'hdr'},
        h('div',{className:'hdr-brand'},
          screen==='detail'
            ? h('button',{
                onClick:function(){ setDetail(null); loadFleet(); },
                style:{background:'none',border:'none',padding:0,cursor:'pointer',display:'flex',alignItems:'center',gap:8,color:'var(--tx2)'}
              },

                h('span',{style:{fontSize:13}},'Fleet')
              )
            : h('div',{style:{display:'flex',alignItems:'center',gap:8}},
                h('span',{className:'hdr-pill'},'FLEET'),
                h('span',{className:'hdr-title'},'Dashboard')
              )
        ),

        )
      ),
      screen==='loading' && h('div',{style:{padding:40,textAlign:'center',color:'var(--tx3)',fontSize:13}},'Loading...'),
      screen==='fleet'   && h(FleetOverview,{vehicles:vehicles,setVehicles:setVehicles,
        onOpen:function(id){ setDetail(id); setScreen('detail'); },
        reload:loadFleet
      }),
      screen==='detail'  && h(VehicleDetail,{
        vehicleId:detail, vehicles:vehicles, setVehicles:setVehicles,
        onBack:function(){ setDetail(null); loadFleet(); }
      })
    );

  // ── FLEET OVERVIEW ──────────────────────────────────────
  function FleetOverview(props) {
    var fl = useState({}), fleetData=fl[0], setFleetData=fl[1];
    var sa = useState(false), showAdd=sa[0], setShowAdd=sa[1];
    var ev = useState(null), editV=ev[0], setEditV=ev[1];
    var dv = useState(null), deleteV=dv[0], setDeleteV=dv[1];
    var dl = useState(false), deleting=dl[0], setDeleting=dl[1];

    useEffect(function(){
      if (!props.vehicles.length) { setFleetData({}); return; }
      var vids = props.vehicles.map(function(v){ return v.id; });
      var d = {};
      // IDB first
      var chain = Promise.resolve();
      vids.forEach(function(vid){
        chain = chain.then(function(){
          return Promise.all([IDB.get('km_'+vid), IDB.get('issues_'+vid)]).then(function(res){
            var km=res[0]||[], iss=res[1]||[];
            d[vid] = {
              last: km.length ? km[km.length-1].odometer : undefined,
              issues: iss.filter(function(i){ return !i.resolved; }).length
            };
          });
        });
      });
      chain.then(function(){ setFleetData(Object.assign({},d)); });
      // Supabase refresh
      _sb.from('km_history').select('vehicle_id,odometer,date').in('vehicle_id',vids).order('date',{ascending:false}).then(function(r){
        (r.data||[]).forEach(function(row){
          if (!d[row.vehicle_id]) d[row.vehicle_id]={};
          if (!d[row.vehicle_id].last) d[row.vehicle_id].last = row.odometer;
        });
        return _sb.from('issues').select('vehicle_id,id').in('vehicle_id',vids).eq('resolved',false);
      }).then(function(r2){
        var counts={};
        (r2.data||[]).forEach(function(row){ counts[row.vehicle_id]=(counts[row.vehicle_id]||0)+1; });
        vids.forEach(function(vid){
          if (!d[vid]) d[vid]={};
          d[vid].issues = counts[vid]||0;
        });
        setFleetData(Object.assign({},d));
      }).catch(function(e){ console.warn('fleet refresh:',e.message); });
    }, [props.vehicles]);

    function saveVehicle(v) {
      _sb.from('vehicles').upsert([v],{onConflict:'id'}).then(function(){
        setShowAdd(false); setEditV(null); props.reload();
      });
    }

    function confirmDelete() {
      if (!deleteV) return;
      setDeleting(true);
      _sb.from('vehicles').delete().eq('id',deleteV.id).then(function(){
        setDeleteV(null); setDeleting(false); props.reload();
      }).catch(function(e){ alert('Delete failed: '+e.message); setDeleting(false); });
    }

    var anyAlert = props.vehicles.some(function(v){
      var d = fleetData[v.id]||{};
      if (d.last===undefined) return false;
      return (d.last - v.last_service_km) >= (v.service_interval_km - 500);
    });

    if (deleteV) {
      return h('div',{className:'page'},
        h('div',{style:{background:'var(--bg)',border:'0.5px solid var(--fail-bd)',borderRadius:'var(--rl)',padding:'24px 20px',textAlign:'center',marginTop:40}},
          h('div',{style:{fontSize:24,marginBottom:8}},'\u26A0'),
          h('div',{style:{fontSize:17,fontWeight:700,marginBottom:6}},'Delete '+deleteV.id+'?'),
          h('div',{style:{fontSize:13,color:'var(--tx2)',marginBottom:6}}, deleteV.year+' '+deleteV.make+' '+deleteV.model),
          h('div',{style:{fontSize:13,color:'var(--fail-tx)',marginBottom:20,lineHeight:1.6}},
            'This permanently deletes the vehicle and all its records. Cannot be undone.'
          ),
          h('div',{style:{display:'flex',gap:10}},
            h('button',{onClick:function(){ setDeleteV(null); },
              style:{flex:1,padding:'13px',background:'transparent',border:'0.5px solid var(--bd2)',borderRadius:'var(--r)',fontSize:13,cursor:'pointer',color:'var(--tx2)'}
            },'Cancel'),
            h('button',{onClick:confirmDelete, disabled:deleting,
              style:{flex:1,padding:'13px',background:'var(--fail-tx)',border:'none',borderRadius:'var(--r)',fontSize:13,fontWeight:700,cursor:'pointer',color:'#fff',opacity:deleting?0.5:1}
            }, deleting?'Deleting...':'Yes, delete')
          )
        )
      );
    }

    if (editV) {
      return h('div',{className:'page'},
        h('span',{className:'slabel'},'EDIT VEHICLE'),
        h(VehicleForm,{vehicle:editV, onSave:saveVehicle, onCancel:function(){ setEditV(null); }})
      );
    }

    return h('div',{className:'page'},
      h('span',{className:'slabel'},'FLEET OVERVIEW'),
      anyAlert && h('div',{className:'alert-strip'},'\u26A0 One or more vehicles approaching or overdue for service'),
      h('div',{className:'fleet-grid'},
        props.vehicles.map(function(v){
          var d = fleetData[v.id]||{};
          var since = d.last!==undefined ? d.last - v.last_service_km : undefined;
          var to    = since!==undefined  ? v.service_interval_km - since : undefined;
          var bCls  = to===undefined?'badge badge-ok':to<=0?'badge badge-fail':to<=500?'badge badge-warn':'badge badge-ok';
          var bTxt  = to===undefined?'':to<=0?'SVC OVERDUE':fmtKm(to)+'km to svc';
          return h('div',{key:v.id, className:'fc', style:{borderLeft:'3px solid '+v.color}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
              h('div',{style:{cursor:'pointer',flex:1}, onClick:function(){ props.onOpen(v.id); }},
                h('div',{className:'fc-id',style:{color:v.color}}, v.id),
                h('div',{className:'fc-model'}, v.year+' '+v.make+' '+v.model)
              ),
              h('div',{style:{display:'flex',gap:5,flexShrink:0,marginLeft:6}},
                h('button',{
                  onClick:function(e){ e.stopPropagation(); setEditV(v); },
                  style:{background:'var(--bg2)',border:'0.5px solid var(--bd)',borderRadius:6,padding:'4px 9px',fontSize:11,color:'var(--tx2)',cursor:'pointer'}
                },'Edit'),
                h('button',{
                  onClick:function(e){ e.stopPropagation(); setDeleteV(v); },
                  style:{background:'var(--fail-bg)',border:'0.5px solid var(--fail-bd)',borderRadius:6,padding:'4px 9px',fontSize:11,color:'var(--fail-tx)',cursor:'pointer'}
                },'\u2715')
              )
            ),
            bTxt && h('div',{className:bCls,style:{marginTop:6,marginBottom:6}}, bTxt),
            h('div',{className:'fc-stats', style:{cursor:'pointer'}, onClick:function(){ props.onOpen(v.id); }},
              h('div',null,
                h('div',{className:'fs-lbl'},'CURRENT KM'),
                h('div',{className:'fs-val'}, d.last?fmtKm(d.last):'\u2014')
              ),
              h('div',null,
                h('div',{className:'fs-lbl'},'ISSUES'),
                h('div',{className:(d.issues>0)?'fs-val fs-bad':'fs-val'}, d.issues||0)
              )
            )
          );
        })
      ),
      !showAdd && h('button',{className:'add-btn', onClick:function(){ setShowAdd(true); }},'+ ADD VEHICLE'),
      showAdd  && h(VehicleForm,{onSave:saveVehicle, onCancel:function(){ setShowAdd(false); }})
    );
  }

  // ── VEHICLE FORM (add/edit) ──────────────────────────────
  function VehicleForm(props) {
    var ex = props.vehicle||{};
    var fs = useState({
      id:                 ex.id||'',
      make:               ex.make||'',
      model:              ex.model||'',
      year:               ex.year||new Date().getFullYear(),
      color:              ex.color||COLORS[0],
      last_service_km:    ex.last_service_km||'',
      last_service_date:  ex.last_service_date||'',
      service_interval_km:ex.service_interval_km||5000
    });
    var f=fs[0], setF=fs[1];
    var isEdit = !!ex.id;
    function save() {
      if (!f.id||!f.make||!f.model) { alert('Fill in ID, make, and model.'); return; }
      props.onSave(Object.assign({},f,{
        year:               parseInt(f.year),
        last_service_km:    parseInt(f.last_service_km)||0,
        service_interval_km:parseInt(f.service_interval_km)||5000
      }));
    }
    return h('div',{className:'add-v-form'},
      h('div',{style:{fontSize:13,fontWeight:600,marginBottom:12}}, isEdit?'Edit '+ex.id:'Add New Vehicle'),
      h('div',{className:'field'},
        h('label',{className:'flabel'},'VEHICLE ID'),
        h('input',{className:'finput', placeholder:'e.g. LV159', value:f.id, disabled:isEdit,
          style:isEdit?{opacity:.5}:{},
          onChange:function(e){ setF(Object.assign({},f,{id:e.target.value.toUpperCase()})); }
        })
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        h('div',{className:'field'},
          h('label',{className:'flabel'},'MAKE'),
          h('input',{className:'finput', placeholder:'Toyota', value:f.make, onChange:function(e){ setF(Object.assign({},f,{make:e.target.value})); }})
        ),
        h('div',{className:'field'},
          h('label',{className:'flabel'},'MODEL'),
          h('input',{className:'finput', placeholder:'HiLux', value:f.model, onChange:function(e){ setF(Object.assign({},f,{model:e.target.value})); }})
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        h('div',{className:'field'},
          h('label',{className:'flabel'},'YEAR'),
          h('input',{className:'finput', type:'number', value:f.year, onChange:function(e){ setF(Object.assign({},f,{year:e.target.value})); }})
        ),
        h('div',{className:'field'},
          h('label',{className:'flabel'},'SVC INTERVAL (km)'),
          h('input',{className:'finput', type:'number', value:f.service_interval_km, onChange:function(e){ setF(Object.assign({},f,{service_interval_km:e.target.value})); }})
        )
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        h('div',{className:'field'},
          h('label',{className:'flabel'},'LAST SVC (km)'),
          h('input',{className:'finput', type:'number', placeholder:'0', value:f.last_service_km, onChange:function(e){ setF(Object.assign({},f,{last_service_km:e.target.value})); }})
        ),
        h('div',{className:'field'},
          h('label',{className:'flabel'},'LAST SVC DATE'),
          h('input',{className:'finput', type:'date', value:f.last_service_date, onChange:function(e){ setF(Object.assign({},f,{last_service_date:e.target.value})); }})
        )
      ),
      h('div',{className:'field'},
        h('label',{className:'flabel'},'COLOUR'),
        h('div',{className:'color-row'},
          COLORS.map(function(c){
            return h('div',{key:c, className:'color-swatch'+(f.color===c?' sel':''), style:{background:c},
              onClick:function(){ setF(Object.assign({},f,{color:c})); }
            });
          })
        )
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{className:'svc-save', onClick:save, style:{flex:1}}, isEdit?'SAVE CHANGES':'ADD VEHICLE'),
        props.onCancel && h('button',{onClick:props.onCancel,
          style:{padding:'11px 16px',background:'transparent',border:'0.5px solid var(--bd2)',borderRadius:'var(--r)',fontSize:11,cursor:'pointer',color:'var(--tx2)'}
        },'Cancel')
      )
    );
  }

  // ── VEHICLE DETAIL ──────────────────────────────────────
  function VehicleDetail(props) {
    var vehicle = props.vehicles.find(function(v){ return v.id===props.vehicleId; })||{};
    var tb = useState('prestarts'), tab=tb[0], setTab=tb[1];
    var is = useState([]), issues=is[0], setIssues=is[1];
    var km = useState([]), kmHist=km[0], setKmHist=km[1];
    var sv = useState([]), svcs=sv[0], setSvcs=sv[1];
    var ps = useState([]), prestarts=ps[0], setPrestarts=ps[1];
    var ld = useState(true), loading=ld[0], setLoading=ld[1];
    var sp = useState(null), selPs=sp[0], setSelPs=sp[1];
    var sf_s = useState(false), showSvcForm=sf_s[0], setShowSvcForm=sf_s[1];
    var sff = useState({date:todayPerth(),odometer:'',tech:'',completed:'',outstanding:''}), sf=sff[0], setSf=sff[1];

    useEffect(function(){
      if (!vehicle.id) return;
      setLoading(true);

      // IDB first for instant display
      var idbPromises = [IDB.get('issues_'+vehicle.id), IDB.get('km_'+vehicle.id), IDB.get('svcs_'+vehicle.id)];
      for (var i=0; i<90; i++) {
        var dd = new Date(Date.now()+8*60*60*1000);
        dd.setDate(dd.getDate()-i);
        var ds = dd.toISOString().slice(0,10);
        idbPromises.push(IDB.get('ps_'+vehicle.id+'_'+ds));
      }
      Promise.all(idbPromises).then(function(res){
        if (res[0]) setIssues(res[0]);
        if (res[1]) setKmHist(res[1]);
        if (res[2]) setSvcs(res[2]);
        var localPs = res.slice(3).filter(Boolean).sort(function(a,b){ return b.date.localeCompare(a.date); });
        if (localPs.length) setPrestarts(localPs);
        setLoading(false);

        // Supabase refresh in background
        Promise.all([
          _sb.from('issues').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}),
          _sb.from('km_history').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:true}),
          _sb.from('service_records').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}),
          _sb.from('prestarts').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}).limit(90)
        ]).then(function(r){
          if (r[0].data && r[0].data.length) { setIssues(r[0].data); IDB.set('issues_'+vehicle.id,r[0].data); }
          if (r[1].data && r[1].data.length) { setKmHist(r[1].data); IDB.set('km_'+vehicle.id,r[1].data); }
          if (r[2].data && r[2].data.length) { setSvcs(r[2].data); IDB.set('svcs_'+vehicle.id,r[2].data); }
          if (r[3].data && r[3].data.length) {
            setPrestarts(r[3].data);
            r[3].data.forEach(function(p){ IDB.set('ps_'+p.vehicle_id+'_'+p.date,p); });
          }
        }).catch(function(e){ console.warn('detail refresh:',e.message); });
      });
    }, [vehicle.id]);

    var open     = issues.filter(function(i){ return !i.resolved; });
    var resolved = issues.filter(function(i){ return i.resolved; });
    var lastKm   = kmHist.length ? kmHist[kmHist.length-1].odometer : (vehicle.last_service_km||0);
    var since    = lastKm - (vehicle.last_service_km||0);
    var to       = (vehicle.service_interval_km||5000) - since;

    function sendServiceAlert() {
      var subject = 'Service Due \u2014 '+vehicle.id;
      var body = 'Vehicle: '+vehicle.id+' ('+vehicle.year+' '+vehicle.make+' '+vehicle.model+')\n'
        +'Current: '+fmtKm(lastKm)+' km\n'
        +'Last service: '+fmtDate(vehicle.last_service_date)+' @ '+fmtKm(vehicle.last_service_km)+' km\n'
        +'Due at: '+fmtKm((vehicle.last_service_km||0)+(vehicle.service_interval_km||5000))+' km\n'
        +(to<=0 ? 'STATUS: OVERDUE by '+fmtKm(Math.abs(to))+' km' : 'Remaining: '+fmtKm(to)+' km');
      window.location.href = 'mailto:'+ALERT_EMAIL+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
    }

    function resolve(id) {
      _sb.from('issues').update({resolved:true,resolved_date:todayPerth()}).eq('id',id).then(function(){
        setIssues(issues.map(function(i){ return i.id===id ? Object.assign({},i,{resolved:true,resolved_date:todayPerth()}) : i; }));
      });
    }

    function deletePs(ps2) {
      if (!confirm('Delete prestart for '+fmtDate(ps2.date)+' by '+ps2.submitted_by+'?')) return;
      _sb.from('prestarts').delete().eq('id',ps2.id).then(function(){
        setPrestarts(prestarts.filter(function(p){ return p.id!==ps2.id; }));
      }).catch(function(e){ alert('Delete failed: '+e.message); });
    }

    function forceRefresh() {
      setLoading(true);
      Promise.all([
        _sb.from('issues').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}),
        _sb.from('km_history').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:true}),
        _sb.from('service_records').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}),
        _sb.from('prestarts').select('*').eq('vehicle_id',vehicle.id).order('date',{ascending:false}).limit(90)
      ]).then(function(r){
        if (r[0].data) { setIssues(r[0].data); IDB.set('issues_'+vehicle.id,r[0].data); }
        if (r[1].data) { setKmHist(r[1].data); IDB.set('km_'+vehicle.id,r[1].data); }
        if (r[2].data) { setSvcs(r[2].data); IDB.set('svcs_'+vehicle.id,r[2].data); }
        if (r[3].data) { setPrestarts(r[3].data); r[3].data.forEach(function(p){ IDB.set('ps_'+p.vehicle_id+'_'+p.date,p); }); }
        setLoading(false);
      }).catch(function(e){ alert('Refresh failed: '+e.message); setLoading(false); });
    }

    function saveSvc() {
      if (!sf.odometer) { alert('Enter odometer reading.'); return; }
      var rec = {id:uid(), vehicle_id:vehicle.id, date:sf.date, odometer:parseInt(sf.odometer), technician:sf.tech, completed:sf.completed, outstanding:sf.outstanding};
      _sb.from('service_records').insert([rec]).then(function(){
        return _sb.from('vehicles').update({last_service_km:parseInt(sf.odometer),last_service_date:sf.date}).eq('id',vehicle.id);
      }).then(function(){
        setSvcs([rec].concat(svcs));
        setShowSvcForm(false);
        setSf({date:todayPerth(),odometer:'',tech:'',completed:'',outstanding:''});
        props.setVehicles(props.vehicles.map(function(v){
          return v.id===vehicle.id ? Object.assign({},v,{last_service_km:parseInt(sf.odometer),last_service_date:sf.date}) : v;
        }));
      });
    }

    return h('div',{className:'page'},
      // Header
      h('div',{className:'dh', style:{borderLeft:'3px solid '+(vehicle.color||'var(--accent)')}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          h('div',null,
            h('div',{className:'dh-id', style:{color:vehicle.color}}, vehicle.id),
            h('div',{className:'dh-model'}, vehicle.year+' '+vehicle.make+' '+vehicle.model)
          ),
          to <= 250 && h('button',{
            onClick:sendServiceAlert,
            style:{background:'var(--warn-bg)',border:'0.5px solid var(--warn-bd)',borderRadius:'var(--r)',padding:'7px 12px',fontSize:11,fontWeight:700,color:'var(--warn-tx)',cursor:'pointer'}
          },'\u2709 Email service alert')
        ),
        h('div',{className:'dh-meta', style:{marginTop:8}},
          h('span',null,'Current: ',h('strong',null,fmtKm(lastKm)+' km')),
          h('span',null,'Since svc: ',h('strong',null,fmtKm(since)+' km')),
          to<=0
            ? h('span',{style:{color:'var(--fail-tx)',fontWeight:600}},'OVERDUE by '+fmtKm(Math.abs(to))+' km')
            : h('span',{style:{color:to<=500?'var(--warn-tx)':'var(--tx2)'}},h('strong',null,fmtKm(to)),' km to next service')
        )
      ),
      // Tabs
      h('div',{className:'tabs-row'},
        h('div',{className:'tabs'},
          ['prestarts','issues','km','services'].map(function(t){
            var labels = {prestarts:'Prestarts',issues:'Issues',km:'KM',services:'Services'};
            return h('button',{key:t, className:'tbtn'+(tab===t?' on':''), onClick:function(){ setTab(t); setSelPs(null); }},
              labels[t],
              t==='issues' && open.length>0 && h('span',{className:'tb-badge'}, open.length)
            );
          })
        ),
        h('button',{onClick:forceRefresh,
          style:{background:'none',border:'0.5px solid var(--bd)',borderRadius:'var(--r)',padding:'6px 10px',fontSize:11,color:'var(--tx3)',cursor:'pointer'}
        },'\u21BB Refresh')
      ),
      loading && h('div',{className:'empty'},'Loading...'),

      // PRESTARTS TAB
      !loading && tab==='prestarts' && h('div',null,
        selPs
          ? h('div',null,
              h('button',{onClick:function(){ setSelPs(null); },
                style:{background:'none',border:'none',color:'var(--tx3)',fontSize:12,cursor:'pointer',padding:'0 0 12px',display:'flex',alignItems:'center',gap:5}
              },'\u2190 Back to list'),
              h('div',{style:{background:'var(--bg)',border:'0.5px solid var(--bd)',borderRadius:'var(--rl)',overflow:'hidden',marginBottom:10}},
                h('div',{style:{padding:'12px 14px',borderBottom:'0.5px solid var(--bd)',display:'flex',justifyContent:'space-between'}},
                  h('div',null,
                    h('div',{style:{fontSize:15,fontWeight:700}}, fmtDate(selPs.date)),
                    h('div',{style:{fontSize:12,color:'var(--tx2)',marginTop:2}}, 'Submitted by '+selPs.submitted_by),
                    selPs.shift && h('div',{style:{fontSize:12,color:'var(--tx3)'}}, 'Shift: '+selPs.shift+(selPs.crew?' \u00B7 Crew: '+selPs.crew:''))
                  ),
                  h('div',{style:{textAlign:'right'}},
                    h('div',{style:{fontSize:16,fontWeight:700,color:'var(--accent)'}}, selPs.odometer?fmtKm(selPs.odometer)+' km':''),
                    selPs.has_critical_fail && h('div',{style:{fontSize:10,fontWeight:700,color:'var(--fail-tx)',marginTop:4}},'CAT A/B FAULT')
                  )
                ),
                selPs.general_comment && h('div',{style:{padding:'10px 14px',borderBottom:'0.5px solid var(--bd)',fontSize:13,color:'var(--tx2)',fontStyle:'italic'}},
                  '\u201C'+selPs.general_comment+'\u201D'
                ),
                ['A','B','C'].map(function(cat){
                  var catItems = CHECKLIST.filter(function(i){ return i.cat===cat; });
                  var catLabels = {A:'Category A \u2014 Walk-around',B:'Category B \u2014 Functional',C:'Category C \u2014 General'};
                  var catColors = {A:'var(--fail-tx)',B:'var(--warn-tx)',C:'var(--ok-tx)'};
                  var catBgs    = {A:'var(--fail-bg)',B:'var(--warn-bg)',C:'var(--ok-bg)'};
                  var fails = catItems.filter(function(i){ return selPs.checks&&selPs.checks[i.id]==='fail'; });
                  return h('div',{key:cat,style:{borderBottom:'0.5px solid var(--bd)'}},
                    h('div',{style:{padding:'8px 14px',background:catBgs[cat],display:'flex',justifyContent:'space-between',alignItems:'center'}},
                      h('span',{style:{fontSize:10,fontWeight:700,letterSpacing:'.08em',color:catColors[cat]}}, catLabels[cat]),
                      fails.length
                        ? h('span',{style:{fontSize:10,fontWeight:700,color:catColors[cat]}}, fails.length+' FAULT'+(fails.length>1?'S':''))
                        : h('span',{style:{fontSize:10,color:'var(--ok-tx)'}},'ALL CLEAR')
                    ),
                    catItems.map(function(item){
                      var val     = selPs.checks  ? selPs.checks[item.id]  : null;
                      var comment = selPs.comments ? selPs.comments[item.id]: null;
                      var rowBg   = val==='fail'?'var(--fail-bg)':val==='pass'?'var(--ok-bg)':'var(--bg2)';
                      var icon    = val==='pass'?'\u2713':val==='fail'?'\u2717':val==='na'?'N/A':'\u2014';
                      var iColor  = val==='pass'?'var(--ok-tx)':val==='fail'?'var(--fail-tx)':'var(--tx3)';
                      return h('div',{key:item.id,style:{padding:'8px 14px',background:rowBg,borderTop:'0.5px solid var(--bd)',display:'flex',gap:10,alignItems:'flex-start'}},
                        h('span',{style:{fontSize:12,fontWeight:700,color:iColor,flexShrink:0,width:30}}, icon),
                        h('div',null,
                          h('div',{style:{fontSize:13,color:val==='fail'?'var(--fail-tx)':val==='pass'?'var(--ok-tx)':'var(--tx3)'}}, item.label),
                          comment && h('div',{style:{fontSize:12,color:'var(--fail-tx)',marginTop:3,fontStyle:'italic'}}, 'Note: '+comment)
                        )
                      );
                    })
                  );
                })
              )
            )
          : h('div',null,
              // today status banner
              (function(){
                var todayPs = prestarts.find(function(p){ return p.date===todayPerth(); });
                var fails   = todayPs&&todayPs.checks ? Object.keys(todayPs.checks).filter(function(k){ return todayPs.checks[k]==='fail'; }).length : 0;
                var bg = todayPs ? (todayPs.has_critical_fail?'var(--fail-bg)':fails>0?'var(--warn-bg)':'var(--ok-bg)') : 'var(--bg2)';
                var bd = todayPs ? (todayPs.has_critical_fail?'var(--fail-bd)':fails>0?'var(--warn-bd)':'var(--ok-bd)') : 'var(--bd)';
                var tx = todayPs ? (todayPs.has_critical_fail?'var(--fail-tx)':fails>0?'var(--warn-tx)':'var(--ok-tx)') : 'var(--tx3)';
                return h('div',{style:{background:bg,border:'0.5px solid '+bd,borderRadius:'var(--r)',padding:'12px 14px',marginBottom:12}},
                  h('div',{style:{fontSize:10,letterSpacing:'.1em',fontWeight:700,marginBottom:4,color:tx}}, 'TODAY \u2014 '+fmtDate(todayPerth())),
                  todayPs
                    ? h('div',{style:{fontSize:13,color:tx}},
                        '\u2713 Submitted by '+todayPs.submitted_by+' at '+fmtKm(todayPs.odometer)+' km'
                        +(todayPs.has_critical_fail?' \u2014 \u26A0 Cat A/B fault':fails>0?' \u2014 '+fails+' fault'+(fails>1?'s':''):' \u2014 All clear')
                      )
                    : h('div',{style:{fontSize:13,color:'var(--tx3)'}},'\u2014 Not yet submitted')
                );
              })(),
              !prestarts.length && h('div',{className:'empty',style:{paddingTop:20}},'No prestarts recorded yet.'),
              prestarts.map(function(ps2){
                var fails   = ps2.checks ? Object.keys(ps2.checks).filter(function(k){ return ps2.checks[k]==='fail'; }) : [];
                var isToday = ps2.date===todayPerth();
                return h('div',{key:ps2.id, className:'ps-card', style:{borderColor:isToday?'var(--ok-bd)':'var(--bd)'}},
                  h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
                    h('div',{style:{cursor:'pointer',flex:1}, onClick:function(){ setSelPs(ps2); }},
                      h('div',{className:'ps-hdr'},
                        h('span',{className:'ps-date'}, fmtDate(ps2.date)+(isToday?' \u2014 today':'')),
                        h('span',{className:'ps-km'}, ps2.odometer?fmtKm(ps2.odometer)+' km':'')
                      ),
                      h('div',{className:'ps-by'}, 'Submitted by '+ps2.submitted_by),
                      ps2.general_comment && h('div',{className:'ps-comment'}, '\u201C'+ps2.general_comment+'\u201D'),
                      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
                        fails.length
                          ? h('div',{className:'ps-fail'},'\u26A0 '+fails.length+' fault'+(fails.length>1?'s':'')+' recorded'+(ps2.has_critical_fail?' \u2014 Cat A/B':''))
                          : h('div',{style:{fontSize:11,color:'var(--ok-tx)'}},'All clear'),
                        h('span',{style:{fontSize:11,color:'var(--tx3)'}},'View \u2192')
                      )
                    ),
                    h('button',{onClick:function(e){ e.stopPropagation(); deletePs(ps2); },
                      style:{background:'none',border:'none',color:'var(--tx3)',fontSize:16,cursor:'pointer',padding:'0 0 0 10px',flexShrink:0}
                    },'\u2715')
                  )
                );
              })
            )
      ),

      // ISSUES TAB
      !loading && tab==='issues' && h('div',null,
        // Report button
        (open.length>0 || resolved.length>0) && h('button',{
          onClick:function(){ generateReport(vehicle, open, resolved, prestarts, lastKm, to); },
          style:{width:'100%',padding:'11px',background:'transparent',border:'0.5px solid var(--bd2)',borderRadius:'var(--r)',color:'var(--accent)',fontSize:11,letterSpacing:'.1em',fontWeight:700,cursor:'pointer',marginBottom:12}
        },'\u21E9 Generate Service Report (PDF)'),
        !open.length && h('div',{className:'empty'},'No outstanding issues'),
        open.map(function(iss){
          return h('div',{key:iss.id, className:'issue-card'},
            h('div',{className:'ic-top'},
              h('div',null,
                h('span',{className:'badge badge-fail'}, iss.category),
                h('div',{className:'ic-lbl'}, iss.label)
              ),
              h('button',{className:'resolve-btn', onClick:function(){ resolve(iss.id); }},'MARK RESOLVED')
            ),
            iss.description && h('div',{className:'ic-desc'}, iss.description),
            h('div',{className:'ic-meta'}, 'Reported by '+(iss.reported_by||'unknown')+' \u00B7 '+fmtDate(iss.date))
          );
        }),
        resolved.length>0 && h('div',null,
          h('span',{className:'slabel',style:{marginTop:20}},'RESOLVED'),
          resolved.map(function(iss){
            return h('div',{key:iss.id, className:'issue-card resolved'},
              h('div',{className:'ic-top'},
                h('div',null,
                  h('span',{className:'badge badge-ok'}, iss.category),
                  h('div',{className:'ic-lbl'}, iss.label)
                ),
                h('span',{className:'resolved-tick'},'\u2713 '+fmtDate(iss.resolved_date))
              )
            );
          })
        )
      ),

      // KM TAB
      !loading && tab==='km' && h('div',null,
        h('div',{className:'chart-wrap'},
          h('div',{className:'chart-title'},'ODOMETER HISTORY'),
          kmHist.length>1
            ? h(SvgChart,{data:kmHist, color:vehicle.color||'var(--accent)', svcs:svcs})
            : h('div',{className:'empty'},'Not enough data yet.')
        ),
        h('div',{className:'info-card'},
          h('div',{className:'ir'},h('span',{className:'ik'},'Last service'),h('span',{className:'iv'},fmtDate(vehicle.last_service_date)+' @ '+fmtKm(vehicle.last_service_km)+' km')),
          h('div',{className:'ir'},h('span',{className:'ik'},'Service interval'),h('span',{className:'iv'},fmtKm(vehicle.service_interval_km)+' km')),
          h('div',{className:'ir'},h('span',{className:'ik'},'Next service at'),h('span',{className:'iv',style:{color:vehicle.color}},fmtKm((vehicle.last_service_km||0)+(vehicle.service_interval_km||5000))+' km')),
          h('div',{className:'ir'},h('span',{className:'ik'},'Remaining'),
            h('span',{className:'iv',style:{color:to<=0?'var(--fail-tx)':to<=500?'var(--warn-tx)':'var(--tx)'}},
              to<=0?'Overdue by '+fmtKm(Math.abs(to))+' km':fmtKm(to)+' km remaining'
            )
          )
        )
      ),

      // SERVICES TAB
      !loading && tab==='services' && h('div',null,
        h('button',{className:'add-btn', onClick:function(){ setShowSvcForm(!showSvcForm); }}, showSvcForm?'CANCEL':'+ LOG SERVICE RECORD'),
        showSvcForm && h('div',{style:{background:'var(--bg)',border:'0.5px solid var(--bd)',borderRadius:'var(--rl)',padding:14,marginBottom:10}},
          h('div',{className:'field'},h('label',{className:'flabel'},'DATE'),h('input',{className:'finput',type:'date',value:sf.date,onChange:function(e){setSf(Object.assign({},sf,{date:e.target.value}));}})),
          h('div',{className:'field'},h('label',{className:'flabel'},'ODOMETER'),h('input',{className:'finput',type:'number',placeholder:'e.g. 50000',value:sf.odometer,onChange:function(e){setSf(Object.assign({},sf,{odometer:e.target.value}));}})),
          h('div',{className:'field'},h('label',{className:'flabel'},'TECHNICIAN'),h('input',{className:'finput',placeholder:'Name',value:sf.tech,onChange:function(e){setSf(Object.assign({},sf,{tech:e.target.value}));}})),
          h('div',{className:'field'},h('label',{className:'flabel'},'WORK COMPLETED'),h('textarea',{className:'finput',rows:3,style:{resize:'vertical'},placeholder:'Oil & filter, greasing...',value:sf.completed,onChange:function(e){setSf(Object.assign({},sf,{completed:e.target.value}));}})),
          h('div',{className:'field'},h('label',{className:'flabel'},'OUTSTANDING / NEXT SERVICE NOTES'),h('textarea',{className:'finput',rows:3,style:{resize:'vertical'},placeholder:'Items for next service...',value:sf.outstanding,onChange:function(e){setSf(Object.assign({},sf,{outstanding:e.target.value}));}})),
          h('button',{className:'svc-save', onClick:saveSvc},'SAVE SERVICE RECORD')
        ),
        !svcs.length && !showSvcForm && h('div',{className:'empty'},'No service records yet.'),
        svcs.map(function(s){
          return h('div',{key:s.id, className:'svc-card'},
            h('div',{className:'svc-hdr'},h('span',{className:'svc-date'},fmtDate(s.date)),h('span',{className:'svc-km'},fmtKm(s.odometer)+' km')),
            s.technician && h('div',{className:'svc-tech'},'Technician: '+s.technician),
            s.completed  && h('div',{className:'svc-sect'},h('div',{className:'svc-sect-lbl'},'COMPLETED'),h('div',{className:'svc-sect-txt'},s.completed)),
            s.outstanding&& h('div',{className:'svc-sect pend'},h('div',{className:'svc-sect-lbl'},'OUTSTANDING'),h('div',{className:'svc-sect-txt'},s.outstanding))
          );
        })
      )
    );
  }

  // ── REPORT GENERATOR ───────────────────────────────────
  function generateReport(vehicle, open, resolved, prestarts, lastKm, to) {
    var now = fmtDate(todayPerth());
    var dueAt = fmtKm((vehicle.last_service_km||0) + (vehicle.service_interval_km||5000));
    var svcStatus = to<=0
      ? '<span style="color:#c94520;font-weight:700">OVERDUE by '+fmtKm(Math.abs(to))+' km</span>'
      : fmtKm(to)+' km remaining (due at '+dueAt+' km)';

    function issRow(iss, resolved) {
      var bg = resolved ? '#f9f9f9' : '#fff8f8';
      var border = resolved ? '#ddd' : '#e8a0a0';
      var statusBadge = resolved
        ? '<span style="background:#e4f4ec;color:#0c5430;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">RESOLVED '+fmtDate(iss.resolved_date)+'</span>'
        : '<span style="background:#fbeaea;color:#5a1010;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:600">OUTSTANDING</span>';
      return '<tr style="background:'+bg+';border-left:3px solid '+border+'">'
        +'<td style="padding:10px 12px;font-size:13px;font-weight:600;width:80px">'+iss.category+'</td>'
        +'<td style="padding:10px 12px;font-size:13px">'
          +iss.label
          +(iss.description ? '<br><span style="color:#666;font-size:12px;font-style:italic">'+iss.description+'</span>' : '')
          +'<br><span style="color:#999;font-size:11px">Reported by '+(iss.reported_by||'unknown')+' &middot; '+fmtDate(iss.date)+'</span>'
        +'</td>'
        +'<td style="padding:10px 12px;text-align:right;white-space:nowrap">'+statusBadge+'</td>'
        +'</tr>';
    }

    // Recent prestart summary - last 7 days
    var recentPs = prestarts.slice(0,7);
    var psRows = recentPs.map(function(ps) {
      var fails = ps.checks ? Object.keys(ps.checks).filter(function(k){ return ps.checks[k]==='fail'; }).length : 0;
      var statusColor = ps.has_critical_fail ? '#c94520' : fails>0 ? '#854F0B' : '#0c5430';
      var statusText  = ps.has_critical_fail ? 'Cat A/B fault' : fails>0 ? fails+' fault'+(fails>1?'s':'') : 'All clear';
      return '<tr>'
        +'<td style="padding:8px 12px;font-size:13px">'+fmtDate(ps.date)+'</td>'
        +'<td style="padding:8px 12px;font-size:13px">'+ps.submitted_by+'</td>'
        +'<td style="padding:8px 12px;font-size:13px">'+(ps.odometer?fmtKm(ps.odometer)+' km':'&mdash;')+'</td>'
        +'<td style="padding:8px 12px;font-size:13px;color:'+statusColor+';font-weight:600">'+statusText+'</td>'
        +(ps.general_comment?'<td style="padding:8px 12px;font-size:12px;color:#666;font-style:italic">'+ps.general_comment+'</td>':'<td></td>')
        +'</tr>';
    }).join('');

    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
      +'<title>Service Report &mdash; '+vehicle.id+'</title>'
      +'<style>'
      +'body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#1a1a18;margin:0;padding:32px;max-width:800px}'
      +'h1{font-size:24px;font-weight:700;margin:0 0 4px}h2{font-size:16px;font-weight:600;margin:24px 0 10px;color:#444}'
      +'table{width:100%;border-collapse:collapse;margin-bottom:8px}'
      +'th{text-align:left;padding:8px 12px;font-size:11px;letter-spacing:.08em;color:#999;font-weight:600;border-bottom:1px solid #eee}'
      +'td{border-bottom:1px solid #f0f0f0;vertical-align:top}'
      +'.meta{display:flex;gap:24px;margin:12px 0 24px;flex-wrap:wrap}'
      +'.meta-item{font-size:13px;color:#666}.meta-item strong{color:#1a1a18;display:block;font-size:15px}'
      +'.header-bar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}'
      +'.veh-id{font-size:32px;font-weight:700;color:#BA7517}'
      +'.report-date{font-size:13px;color:#999;text-align:right}'
      +'.divider{border:none;border-top:1px solid #eee;margin:20px 0}'
      +'@media print{body{padding:16px}button{display:none!important}}'
      +'</style></head><body>'
      // Header
      +'<div class="header-bar">'
      +'<div><div class="veh-id">'+vehicle.id+'</div><div style="font-size:15px;color:#666">'+vehicle.year+' '+vehicle.make+' '+vehicle.model+'</div></div>'
      +'<div class="report-date">SERVICE REPORT<br>Generated: '+now+'</div>'
      +'</div>'
      // Key stats
      +'<div class="meta">'
      +'<div class="meta-item"><strong>'+fmtKm(lastKm)+' km</strong>Current odometer</div>'
      +'<div class="meta-item"><strong>'+fmtDate(vehicle.last_service_date)+'</strong>Last service</div>'
      +'<div class="meta-item"><strong>'+fmtKm(vehicle.last_service_km)+' km</strong>Odometer at last service</div>'
      +'<div class="meta-item"><strong>'+svcStatus+'</strong>Service status</div>'
      +'</div>'
      +'<hr class="divider">'
      // Outstanding issues
      +'<h2>Outstanding Issues ('+open.length+')</h2>'
      +(open.length===0
        ? '<p style="color:#999;font-size:13px">No outstanding issues recorded.</p>'
        : '<table><thead><tr><th>Category</th><th>Issue</th><th>Status</th></tr></thead><tbody>'+open.map(function(i){ return issRow(i,false); }).join('')+'</tbody></table>'
      )
      // Resolved issues
      +(resolved.length>0
        ? '<h2>Resolved Issues ('+resolved.length+')</h2>'
          +'<table><thead><tr><th>Category</th><th>Issue</th><th>Status</th></tr></thead><tbody>'+resolved.map(function(i){ return issRow(i,true); }).join('')+'</tbody></table>'
        : ''
      )
      +'<hr class="divider">'
      // Recent prestarts
      +'<h2>Recent Prestarts (last 7 days)</h2>'
      +(recentPs.length===0
        ? '<p style="color:#999;font-size:13px">No recent prestarts recorded.</p>'
        : '<table><thead><tr><th>Date</th><th>Submitted by</th><th>Odometer</th><th>Result</th><th>General comment</th></tr></thead><tbody>'+psRows+'</tbody></table>'
      )
      +'<hr class="divider">'
      +'<p style="font-size:12px;color:#999;margin-top:16px">This report was generated from the Fleet Prestart System &mdash; '+todayPerth()+'</p>'
      +'<button onclick="window.print()" style="margin-top:16px;padding:12px 24px;background:#BA7517;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.06em">PRINT / SAVE AS PDF</button>'
      +'</body></html>';

    var w = window.open('','_blank');
    w.document.write(html);
    w.document.close();
  }

  // ── SVG CHART ──────────────────────────────────────────
  function SvgChart(props) {
    var data=props.data, color=props.color||'#BA7517', svcs=props.svcs||[];
    if (!data||data.length<2) return null;
    var W=500,H=160,PL=38,PR=10,PT=8,PB=24;
    var vals = data.map(function(d){ return d.odometer; });
    var minV = Math.min.apply(null,vals), maxV=Math.max.apply(null,vals), rng=maxV-minV||1;
    function px(i){ return PL+(i/(data.length-1))*(W-PL-PR); }
    function py(v){ return PT+(H-PB)-(((v-minV)/rng)*(H-PT-PB)); }
    var pts  = data.map(function(d,i){ return px(i)+','+py(d.odometer); }).join(' ');
    var fill = pts+' '+px(data.length-1)+','+H+' '+PL+','+H;
    var yTicks = [minV, minV+rng/2, maxV];
    var lblIdx = [0, Math.floor((data.length-1)/2), data.length-1];
    return h('svg',{viewBox:'0 0 '+W+' '+H, width:'100%', style:{display:'block',overflow:'visible'}},
      yTicks.map(function(v,i){ return h('line',{key:'g'+i,x1:PL,y1:py(v),x2:W-PR,y2:py(v),stroke:'rgba(128,128,128,0.15)',strokeWidth:1}); }),
      svcs.map(function(s,i){
        var idx = data.findIndex(function(x){ return x.date===s.date; });
        if (idx<0) return null;
        return h('line',{key:'sv'+i,x1:px(idx),y1:PT,x2:px(idx),y2:H-PB,stroke:'#185FA5',strokeWidth:1,strokeDasharray:'3 3'});
      }),
      h('polygon',{points:fill, fill:color, opacity:0.08}),
      h('polyline',{points:pts, fill:'none', stroke:color, strokeWidth:2, strokeLinejoin:'round', strokeLinecap:'round'}),
      yTicks.map(function(v,i){ return h('text',{key:'y'+i,x:PL-4,y:py(v)+4,textAnchor:'end',fontSize:9,fill:'#888'},Math.round(v/1000)+'k'); }),
      lblIdx.map(function(i){ return h('text',{key:'x'+i,x:px(i),y:H-2,textAnchor:'middle',fontSize:9,fill:'#888'},data[i].date.slice(5)); })
    );
  }

  // Mount
  ReactDOM.createRoot(document.getElementById('root')).render(h(App));

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(function(reg){
      reg.addEventListener('updatefound', function(){
        var nw = reg.installing;
        nw.addEventListener('statechange', function(){
          if (nw.state==='activated') window.location.reload();
        });
      });
    });
  }
});
</script>
</body>
</html>
